- name: Varnish Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure Varnish
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # Block until the lock clears (and use lock_timeout on apt tasks) before installing.
          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300


          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/varnish-24-04/etc/systemd/system/varnish.service.d/override.conf', confdest: '/etc/systemd/system/varnish.service.d/'}
              - { confsrc: '/usr/local/src/varnish-24-04/etc/varnish/default.vcl', confdest: '/etc/varnish/'}
              - { confsrc: '/usr/local/src/varnish-24-04/etc/nginx/sites-available/varnish-backend.conf', confdest: '/etc/nginx/sites-available/'}
              - { confsrc: '/usr/local/src/varnish-24-04/var/www/html/index.html', confdest: '/var/www/html/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Install nginx backend web server
            apt:
              name:
                - nginx
              state: latest
              lock_timeout: 300

          - name: Install Varnish caching reverse proxy
            apt:
              name:
                - varnish
              state: latest
              lock_timeout: 300

          - name: Ensure web root exists
            file:
              path: /var/www/html
              state: directory
              owner: www-data
              group: www-data
              mode: '0755'

          - name: Deploy landing page served by the nginx backend
            copy:
              dest: /var/www/html/index.html
              owner: www-data
              group: www-data
              mode: '0644'
              content: |
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="utf-8">
                    <title>Varnish Cache Active</title>
                    <meta name="viewport" content="width=device-width, initial-scale=1">
                    <style>
                        body { font-family: sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; color: #222; }
                        h1 { color: #c9302c; }
                        code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
                    </style>
                </head>
                <body>
                    <h1>Varnish cache active</h1>
                    <p>This page is served by an nginx backend on <code>127.0.0.1:8080</code> and cached by Varnish on port <code>80</code>.</p>
                    <p>Check the <code>X-Cache</code> response header (<code>HIT</code>/<code>MISS</code>) to confirm caching.</p>
                    <p>Edit the backend in <code>/etc/varnish/default.vcl</code> to point Varnish at your real application.</p>
                </body>
                </html>

          - name: Ownership of web root
            file:
              path: /var/www/html
              state: directory
              owner: www-data
              group: www-data
              recurse: yes

          - name: "Configure nginx backend to listen only on 127.0.0.1:8080"
            copy:
              dest: /etc/nginx/sites-available/varnish-backend.conf
              mode: '0644'
              content: |
                server {
                    listen 127.0.0.1:8080;
                    server_name _;

                    root /var/www/html;
                    index index.html;

                    location / {
                        try_files $uri $uri/ =404;
                    }
                }

          - name: Enable the nginx backend site
            file:
              src: /etc/nginx/sites-available/varnish-backend.conf
              dest: /etc/nginx/sites-enabled/varnish-backend.conf
              state: link

          - name: Remove default nginx site so it does not bind :80
            file:
              path: /etc/nginx/sites-enabled/default
              state: absent

          - name: "Point Varnish backend at nginx (127.0.0.1:8080) and add X-Cache header"
            copy:
              dest: /etc/varnish/default.vcl
              mode: '0644'
              content: |
                vcl 4.1;

                backend default {
                    .host = "127.0.0.1";
                    .port = "8080";
                }

                sub vcl_deliver {
                    if (obj.hits > 0) {
                        set resp.http.X-Cache = "HIT";
                    } else {
                        set resp.http.X-Cache = "MISS";
                    }
                    set resp.http.X-Cache-Hits = obj.hits;
                }

          - name: Debug - overriding varnish systemd unit to listen on port 80
            debug:
              msg: "Configuring Varnish to listen on :80 via systemd override (keeps -F foreground so the service stays active)"

          - name: Create varnish systemd override directory
            file:
              path: /etc/systemd/system/varnish.service.d
              state: directory
              mode: '0755'

          # The Varnish listen port on systemd/Ubuntu comes from the unit ExecStart, NOT default.vcl
          # or /etc/default/varnish. We keep -F (foreground) so systemd's Type stays satisfied and the
          # daemon does not fork+die (rule 24). daemon-reload + restart follows.
          - name: Override varnishd ExecStart to listen on :80 (keep -F foreground)
            copy:
              dest: /etc/systemd/system/varnish.service.d/override.conf
              mode: '0644'
              content: |
                [Service]
                ExecStart=
                ExecStart=/usr/sbin/varnishd -F -a :80 -T localhost:6082 -f /etc/varnish/default.vcl -S /etc/varnish/secret -s malloc,256m

          - name: Debug - restarting backend then reloading systemd for Varnish
            debug:
              msg: "Restarting nginx backend, then daemon-reload and restart Varnish (order matters)"

          - name: Enable and restart nginx backend
            service:
              name: nginx
              state: restarted
              enabled: yes

          - name: Reload systemd to pick up the varnish override
            systemd:
              daemon_reload: yes

          - name: Enable and restart Varnish on :80
            service:
              name: varnish
              state: restarted
              enabled: yes

          - name: Wait for Varnish to be listening on port 80
            wait_for:
              host: 127.0.0.1
              port: 80
              timeout: 30

          - name: Verify the full cache stack serves through Varnish (HTTP 200 + Varnish header)
            uri:
              url: http://localhost/
              return_content: yes
            register: varnish_check
            until: varnish_check.status == 200 and 'Varnish cache active' in varnish_check.content
            retries: 5
            delay: 3

          - name: Debug - confirm Varnish caching headers present
            debug:
              msg: "Served via Varnish - X-Cache={{ varnish_check.x_cache | default('n/a') }} X-Varnish={{ varnish_check.x_varnish | default('n/a') }}"

          - name: Write architecture / credentials info file
            copy:
              dest: /home/ubuntu/credentials.txt
              mode: '0600'
              content: |
                Varnish Cache Stack
                Architecture:
                  Varnish (public)  : port 80  -> caches responses
                  nginx (backend)   : 127.0.0.1:8080 -> serves /var/www/html

                Varnish serves nothing on its own; it forwards cache-misses to the
                nginx backend. Without a reachable backend it returns
                "503 Backend fetch failed".

                Files:
                  VCL config        : /etc/varnish/default.vcl
                  systemd override  : /etc/systemd/system/varnish.service.d/override.conf
                  nginx backend     : /etc/nginx/sites-available/varnish-backend.conf
                  web root          : /var/www/html

                Repoint Varnish at a real app:
                  Edit the backend block in /etc/varnish/default.vcl (.host/.port),
                  then:  systemctl reload varnish   (or)   systemctl restart varnish

                Note: the Varnish listen port is set by the systemd unit ExecStart
                (override.conf, -a :80), NOT by default.vcl or /etc/default/varnish.
                Always run: systemctl daemon-reload && systemctl restart varnish

                Varnish management/admin interface:
                  Address : localhost:6082
                  Secret  : /etc/varnish/secret
                  Connect : varnishadm -T localhost:6082 -S /etc/varnish/secret

                Verify caching:
                  curl -I http://localhost/ | grep -i 'via\|x-cache\|x-varnish'
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/varnish-24-04/opt/cloudstack/varnish-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/varnish-24-04/opt/cloudstack/varnish-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/varnish-24-04_cleanup.sh && /opt/cloudstack/varnish-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
