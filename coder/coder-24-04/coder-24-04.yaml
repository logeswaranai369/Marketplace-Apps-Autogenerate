- name: Coder Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure Coder
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # STOP the apt-daily timers/services FIRST so they cannot re-acquire the lock mid-run — a
          # one-shot wait isn't enough for long installs (GitLab/BBB/desktop, ~20-40 min): the timer
          # fires again during the install and kills a later apt task with rc=100 (hit live on Ubuntu
          # Desktop). Then block until any in-progress lock clears before installing.
          - name: Stop apt-daily timers/services so they can't grab the dpkg lock mid-install
            shell: |
              systemctl stop apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
              systemctl stop apt-daily.service apt-daily-upgrade.service unattended-upgrades.service 2>/dev/null || true
              systemctl kill --kill-who=all apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
              exit 0
            changed_when: false

          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300

          - name: Generating coder_admin_password
            shell: openssl rand -hex 24
            register: coder_admin_password

          - name: Storing coder_admin_password
            copy:
              dest: "/root/.coder_admin_password"
              content: |
                coder_admin_password = "{{ coder_admin_password.stdout }}"


          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Install Coder via the official installer
            debug:
              msg: "Installing Coder server using the official install script"

          - name: Download Coder install script
            get_url:
              url: https://coder.com/install.sh
              dest: /tmp/coder-install.sh
              mode: '0755'

          - name: Run Coder installer (drops the .deb, creates /usr/bin/coder and coder.service)
            command: sh /tmp/coder-install.sh
            args:
              creates: /usr/bin/coder
            environment:
              HOME: /root

          - name: Install Docker so built-in workspace templates work
            debug:
              msg: "Installing Docker Engine via get.docker.com"

          - name: Download Docker install script
            get_url:
              url: https://get.docker.com
              dest: /tmp/get-docker.sh
              mode: '0755'

          - name: Run Docker installer
            command: sh /tmp/get-docker.sh
            args:
              creates: /usr/bin/docker

          - name: Ensure Docker is enabled and running
            service:
              name: docker
              state: started
              enabled: yes

          - name: Add coder user to the docker group
            user:
              name: coder
              groups: docker
              append: yes

          - name: Configure Coder server environment
            debug:
              msg: "Writing /etc/coder.d/coder.env (must be non-empty for ConditionFileNotEmpty)"

          - name: Ensure Coder config directory exists
            file:
              path: /etc/coder.d
              state: directory
              mode: '0755'

          # CODER_PG_CONNECTION_URL is intentionally absent -> Coder auto-provisions its built-in
          # PostgreSQL on first boot. CODER_ACCESS_URL host is a placeholder the operator replaces
          # post-deploy with the real public IP/domain (the guest only sees a private NAT IP).
          - name: Write Coder environment file (non-empty; no secrets)
            copy:
              dest: /etc/coder.d/coder.env
              content: |
                CODER_ACCESS_URL=http://REPLACE_WITH_PUBLIC_HOST:3000
                CODER_HTTP_ADDRESS=0.0.0.0:3000
                CODER_TLS_ENABLE=false
              mode: '0644'

          - name: Enable and start Coder service
            debug:
              msg: "Reloading systemd and starting coder.service"

          - name: Reload systemd unit files
            systemd:
              daemon_reload: yes

          - name: Enable and start coder.service
            service:
              name: coder
              state: started
              enabled: yes

          # First boot downloads/inits the built-in PostgreSQL (~10-20s). /healthz returns 200 with
          # body 'OK' once ready — unauthenticated, so this is a valid readiness gate.
          - name: Wait for Coder /healthz to return 200 (built-in PostgreSQL init)
            uri:
              url: http://localhost:3000/healthz
              return_content: yes
              status_code: 200
            register: coder_health
            until: coder_health.status == 200
            retries: 30
            delay: 5

          - name: Create first admin user
            debug:
              msg: "Creating the initial Coder admin user (headless, idempotent)"

          # Idempotent: if the first user already exists, `coder login` with --first-user flags returns
          # non-zero and we tolerate it. Password rule is only min-8-chars, so the hex secret is fine.
          - name: Create first admin (only if not already set up)
            command: >
              coder login http://localhost:3000
              --first-user-username admin
              --first-user-email admin@example.com
              --first-user-password '{{ coder_admin_password.stdout }}'
              --first-user-trial=false
            environment:
              HOME: /root
            register: coder_firstuser
            failed_when: false
            changed_when: "'Welcome to Coder' in coder_firstuser.stdout or coder_firstuser.rc == 0"

          - name: Ensure ubuntu home directory exists for credentials file
            file:
              path: /home/ubuntu
              state: directory
              owner: ubuntu
              group: ubuntu
              mode: '0755'

          - name: Write credentials file
            copy:
              dest: /home/ubuntu/credentials.txt
              owner: ubuntu
              group: ubuntu
              mode: '0600'
              content: |
                Coder web UI:  http://<server-ip>:3000
                Admin username: admin
                Admin email:    admin@example.com
                Admin password: {{ coder_admin_password.stdout }}

                POST-DEPLOY NOTES:
                - Open 3000/tcp on your cloud firewall.
                - Set the real CODER_ACCESS_URL (public IP/domain) in /etc/coder.d/coder.env,
                  then run: systemctl restart coder
                  (required for remote workspace connections).
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/coder-24-04/opt/cloudstack/coder-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/coder-24-04/opt/cloudstack/coder-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/coder-24-04_cleanup.sh && /opt/cloudstack/coder-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
