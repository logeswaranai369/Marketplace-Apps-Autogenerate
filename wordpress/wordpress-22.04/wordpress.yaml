- name: wordpress Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure wordpress
        block:
          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes

          - name: Generating mysql_root_password
            shell: openssl rand -hex 24
            register: mysql_root_password

          - name: Storing mysql_root_password
            copy:
              dest: "/root/.mysql_root_password"
              content: |
                mysql_root_password = "{{ mysql_root_password.stdout }}"
          - name: Generating wordpress_db_password
            shell: openssl rand -hex 24
            register: wordpress_db_password

          - name: Storing wordpress_db_password
            copy:
              dest: "/root/.wordpress_db_password"
              content: |
                wordpress_db_password = "{{ wordpress_db_password.stdout }}"
          - name: Generating wordpress_admin_password
            shell: openssl rand -hex 24
            register: wordpress_admin_password

          - name: Storing wordpress_admin_password
            copy:
              dest: "/root/.wordpress_admin_password"
              content: |
                wordpress_admin_password = "{{ wordpress_admin_password.stdout }}"

          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/wordpress-22.04/etc/apache2/sites-available/wordpress.conf', confdest: '/etc/apache2/sites-available/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Show LAMP stack installation stage
            debug:
              msg: "Installing Apache, MariaDB, PHP and required extensions for WordPress"

          - name: Install LAMP stack and required PHP extensions
            package:
              name:
                - apache2
                - mariadb-server
                - php
                - php-mysql
                - libapache2-mod-php
                - php-cli
                - php-curl
                - php-gd
                - php-mbstring
                - php-xml
                - php-zip
                - php-imagick
                - php-intl
                - wget
                - unzip
                - python3-pymysql
              state: latest

          - name: Ensure Apache and MariaDB are enabled and running
            service:
              name: "{{ item }}"
              state: started
              enabled: yes
            loop:
              - apache2
              - mariadb

          - name: Show database configuration stage
            debug:
              msg: "Securing MariaDB and creating the WordPress database and user"

          - name: Secure MariaDB root account with generated password
            community.mysql.mysql_user:
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: root
              host: localhost
              password: "{{ mysql_root_password.stdout }}"
              check_implicit_admin: yes
              state: present

          - name: Create WordPress database
            community.mysql.mysql_db:
              login_user: root
              login_password: "{{ mysql_root_password.stdout }}"
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: wordpress
              state: present

          - name: Create WordPress database user
            community.mysql.mysql_user:
              login_user: root
              login_password: "{{ mysql_root_password.stdout }}"
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: wordpress
              password: "{{ wordpress_db_password.stdout }}"
              host: localhost
              priv: "wordpress.*:ALL"
              state: present

          - name: Show WordPress download stage
            debug:
              msg: "Downloading and extracting the latest WordPress core"

          - name: Ensure WordPress web root exists
            file:
              path: /var/www/html/wordpress
              state: directory
              owner: www-data
              group: www-data
              mode: '0755'

          - name: Download latest WordPress tarball
            get_url:
              url: https://wordpress.org/latest.tar.gz
              dest: /tmp/wordpress-latest.tar.gz
              mode: '0644'

          - name: Check if WordPress is already extracted
            stat:
              path: /var/www/html/wordpress/wp-settings.php
            register: wp_installed

          - name: Extract WordPress to web root
            unarchive:
              src: /tmp/wordpress-latest.tar.gz
              dest: /var/www/html/wordpress
              remote_src: yes
              extra_opts:
                - --strip-components=1
              owner: www-data
              group: www-data
            when: not wp_installed.stat.exists

          - name: Set directory permissions
            command: find /var/www/html/wordpress -type d -exec chmod 755 {} \;
            changed_when: false

          - name: Set file permissions
            command: find /var/www/html/wordpress -type f -exec chmod 644 {} \;
            changed_when: false

          - name: Ensure ownership of WordPress files
            file:
              path: /var/www/html/wordpress
              state: directory
              owner: www-data
              group: www-data
              recurse: yes

          - name: Show WordPress configuration stage
            debug:
              msg: "Generating wp-config.php with DB credentials and fresh salts"

          - name: Create wp-config.php from sample
            copy:
              src: /var/www/html/wordpress/wp-config-sample.php
              dest: /var/www/html/wordpress/wp-config.php
              remote_src: yes
              owner: www-data
              group: www-data
              mode: '0640'
              force: no

          - name: Set DB name in config
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'DB_NAME',\\s*'[^']*'\\s*\\);"
              replace: "define( 'DB_NAME', 'wordpress' );"

          - name: Set DB user in config
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'DB_USER',\\s*'[^']*'\\s*\\);"
              replace: "define( 'DB_USER', 'wordpress' );"

          - name: Set DB password in config (real value, never a placeholder)
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'DB_PASSWORD',\\s*'[^']*'\\s*\\);"
              replace: "define( 'DB_PASSWORD', '{{ wordpress_db_password.stdout }}' );"

          - name: Set DB host in config
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'DB_HOST',\\s*'[^']*'\\s*\\);"
              replace: "define( 'DB_HOST', 'localhost' );"

          - name: Fetch fresh WordPress salts
            uri:
              url: https://api.wordpress.org/secret-key/1.1/salt/
              return_content: yes
            register: wp_salts

          - name: Inject fresh salts into wp-config.php
            blockinfile:
              path: /var/www/html/wordpress/wp-config.php
              marker: "// {mark} MARKGEN SALTS"
              block: "{{ wp_salts.content }}"

          - name: Remove default WordPress salt placeholder lines
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'(AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY|AUTH_SALT|SECURE_AUTH_SALT|LOGGED_IN_SALT|NONCE_SALT)',\\s*'put your unique phrase here'\\s*\\);\\n"
              replace: ""

          # The public URL of a marketplace VM is NOT known at install time (CloudStack NAT).
          # Make WordPress URL-agnostic: derive the site URL from the actual Host header.
          - name: Make WordPress URL-agnostic (serve on whatever host the browser used)
            blockinfile:
              path: /var/www/html/wordpress/wp-config.php
              marker: "// {mark} MARKGEN DYNAMIC SITE URL"
              insertbefore: "/\\* That's all, stop editing"
              block: |
                if ( isset( $_SERVER['HTTP_HOST'] ) ) {
                    $markgen_scheme = ( ! empty( $_SERVER['HTTPS'] ) && $_SERVER['HTTPS'] !== 'off' ) ? 'https' : 'http';
                    define( 'WP_HOME', $markgen_scheme . '://' . $_SERVER['HTTP_HOST'] );
                    define( 'WP_SITEURL', $markgen_scheme . '://' . $_SERVER['HTTP_HOST'] );
                }

          - name: Show Apache vhost stage
            debug:
              msg: "Configuring the Apache virtual host for WordPress"

          - name: Deploy Apache virtual host (DocumentRoot MUST match the extract path)
            copy:
              dest: /etc/apache2/sites-available/wordpress.conf
              content: |
                <VirtualHost *:80>
                    ServerName localhost
                    DocumentRoot /var/www/html/wordpress
                    <Directory /var/www/html/wordpress>
                        Options FollowSymLinks
                        AllowOverride All
                        Require all granted
                    </Directory>
                    ErrorLog ${APACHE_LOG_DIR}/wordpress_error.log
                    CustomLog ${APACHE_LOG_DIR}/wordpress_access.log combined
                </VirtualHost>
              mode: '0644'

          - name: Enable site and rewrite, disable default site
            command: "{{ item }}"
            loop:
              - a2ensite wordpress
              - a2enmod rewrite
              - a2dissite 000-default
            ignore_errors: yes

          - name: Reload Apache to apply configuration
            service:
              name: apache2
              state: reloaded

          - name: Show WordPress first-run setup stage
            debug:
              msg: "Completing WordPress installation via WP-CLI so the site actually serves"

          - name: Download WP-CLI
            get_url:
              url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              dest: /usr/local/bin/wp
              mode: '0755'

          - name: Check if WordPress setup is already complete
            command: wp core is-installed --path=/var/www/html/wordpress --allow-root
            register: wp_core_installed
            failed_when: false
            changed_when: false

          # --url is only a bootstrap seed; dynamic WP_HOME/WP_SITEURL in wp-config overrides per-request.
          - name: Complete first-run setup so the app actually SERVES (health check needs 2xx)
            command: >
              wp core install
              --path=/var/www/html/wordpress
              --url=http://localhost/
              --title="WordPress Site"
              --admin_user=admin
              --admin_password='{{ wordpress_admin_password.stdout }}'
              --admin_email=admin@localhost.local
              --skip-email
              --allow-root
            when: wp_core_installed.rc != 0

          - name: Show credentials summary stage
            debug:
              msg: "Writing credentials summary to /home/ubuntu/credentials.txt"

          - name: Ensure /home/ubuntu exists
            file:
              path: /home/ubuntu
              state: directory
              owner: ubuntu
              group: ubuntu
              mode: '0755'

          - name: Write human-readable credentials summary
            copy:
              dest: /home/ubuntu/credentials.txt
              owner: ubuntu
              group: ubuntu
              mode: '0600'
              content: |
                WordPress Installation Credentials

                Site URL (browse to this VM's public IP/hostname): http://<server-ip>/
                Admin login page: http://<server-ip>/wp-login.php

                WordPress Admin:
                  Username: admin
                  Password: {{ wordpress_admin_password.stdout }}
                  Email:    admin@localhost.local

                Database:
                  DB Name:  wordpress
                  DB User:  wordpress
                  DB Pass:  {{ wordpress_db_password.stdout }}
                  DB Host:  localhost

                MariaDB root password: {{ mysql_root_password.stdout }}
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/wordpress-22.04/opt/cloudstack/wordpress_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/wordpress-22.04/opt/cloudstack/wordpress_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/wordpress_cleanup.sh && /opt/cloudstack/wordpress_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
