- name: Joomla (LAMP) Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure Joomla (LAMP)
        block:
          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes

          - name: Generating mysql_root_password
            shell: openssl rand -hex 24
            register: mysql_root_password

          - name: Storing mysql_root_password
            copy:
              dest: "/root/.mysql_root_password"
              content: |
                mysql_root_password = "{{ mysql_root_password.stdout }}"
          - name: Generating joomla_db_password
            shell: openssl rand -hex 24
            register: joomla_db_password

          - name: Storing joomla_db_password
            copy:
              dest: "/root/.joomla_db_password"
              content: |
                joomla_db_password = "{{ joomla_db_password.stdout }}"
          - name: Generating joomla_admin_password
            shell: openssl rand -hex 24
            register: joomla_admin_password

          - name: Storing joomla_admin_password
            copy:
              dest: "/root/.joomla_admin_password"
              content: |
                joomla_admin_password = "{{ joomla_admin_password.stdout }}"

          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/joomla-lamp-24-04/etc/apache2/sites-available/joomla.conf', confdest: '/etc/apache2/sites-available/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Install web server packages
            package:
              name:
                - apache2
                - libapache2-mod-php
              state: latest

          - name: Install PHP and required extensions
            package:
              name:
                - php
                - php-mysql
                - php-gd
                - php-mbstring
                - php-xml
                - php-curl
                - php-zip
                - php-intl
              state: latest

          - name: Install MariaDB and Python MySQL bindings
            package:
              name:
                - mariadb-server
                - python3-pymysql
              state: latest

          - name: Ensure Apache and MariaDB are enabled and running
            service:
              name: "{{ item }}"
              state: started
              enabled: yes
            loop:
              - apache2
              - mariadb

          - name: "Show DB setup stage"
            debug:
              msg: "Securing MariaDB root and creating the Joomla database"

          # Multi-auth so root keeps BOTH password and unix_socket access (no lockout).
          - name: Secure MariaDB root (password + keep socket auth; no lockout)
            shell: |
              mysql -u root <<'SQL'
              ALTER USER 'root'@'localhost' IDENTIFIED VIA mysql_native_password USING PASSWORD('{{ mysql_root_password.stdout }}') OR unix_socket;
              FLUSH PRIVILEGES;
              SQL
            args:
              executable: /bin/bash

          - name: Store MariaDB root password after it was applied
            copy:
              dest: /root/.mysql_root_password
              content: "mysql_root_password = \"{{ mysql_root_password.stdout }}\"\n"
              mode: '0600'

          - name: Create Joomla database
            community.mysql.mysql_db:
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: joomla
              state: present

          - name: Create Joomla database user
            community.mysql.mysql_user:
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: joomla
              password: "{{ joomla_db_password.stdout }}"
              host: localhost
              priv: "joomla.*:ALL"
              state: present

          - name: Store Joomla DB password after user creation succeeded
            copy:
              dest: /root/.joomla_db_password
              content: "joomla_db_password = \"{{ joomla_db_password.stdout }}\"\n"
              mode: '0600'

          - name: "Show Joomla download stage"
            debug:
              msg: "Downloading and extracting the Joomla Full Package"

          - name: Check if Joomla is already extracted
            stat:
              path: /var/www/html/libraries/src/Version.php
            register: joomla_extracted

          - name: Download Joomla 5.x Full Package tarball
            get_url:
              url: https://github.com/joomla/joomla-cms/releases/download/5.3.2/Joomla_5.3.2-Stable-Full_Package.tar.gz
              dest: /tmp/joomla-full.tar.gz
              mode: '0644'
            when: not joomla_extracted.stat.exists

          - name: Ensure web root exists
            file:
              path: /var/www/html
              state: directory
              owner: www-data
              group: www-data

          - name: Extract Joomla into web root
            unarchive:
              src: /tmp/joomla-full.tar.gz
              dest: /var/www/html
              remote_src: yes
              owner: www-data
              group: www-data
            when: not joomla_extracted.stat.exists

          - name: Ensure ownership of web root
            file:
              path: /var/www/html
              state: directory
              owner: www-data
              group: www-data
              recurse: yes

          - name: "Show Joomla install stage"
            debug:
              msg: "Running the non-interactive Joomla CLI installer"

          - name: Check if Joomla is already configured
            stat:
              path: /var/www/html/configuration.php
            register: joomla_configured

          - name: Run Joomla CLI installer (non-interactive)
            command: >
              php installation/joomla.php install
              --site-name="Joomla Site"
              --admin-user="Administrator"
              --admin-username=admin
              --admin-password='{{ joomla_admin_password.stdout }}'
              --admin-email=admin@localhost.local
              --db-type=mysqli
              --db-host=localhost
              --db-user=joomla
              --db-pass='{{ joomla_db_password.stdout }}'
              --db-name=joomla
              --db-prefix=jos_
              --db-encryption=0
            args:
              chdir: /var/www/html
            become: yes
            become_user: www-data
            when: not joomla_configured.stat.exists
            register: joomla_install

          - name: Remove Joomla installer directory after successful install
            file:
              path: /var/www/html/installation
              state: absent
            when: joomla_configured.stat.exists or joomla_install is changed

          - name: Store Joomla admin password after install succeeded
            copy:
              dest: /root/.joomla_admin_password
              content: "joomla_admin_password = \"{{ joomla_admin_password.stdout }}\"\n"
              mode: '0600'

          - name: "Show Apache configuration stage"
            debug:
              msg: "Configuring the Apache vhost for Joomla"

          - name: Deploy Joomla Apache vhost
            copy:
              dest: /etc/apache2/sites-available/joomla.conf
              content: |
                <VirtualHost *:80>
                    ServerAdmin webmaster@localhost
                    DocumentRoot /var/www/html

                    <Directory /var/www/html>
                        Options FollowSymLinks
                        AllowOverride All
                        Require all granted
                        DirectoryIndex index.php index.html
                    </Directory>

                    ErrorLog ${APACHE_LOG_DIR}/joomla_error.log
                    CustomLog ${APACHE_LOG_DIR}/joomla_access.log combined
                </VirtualHost>
              mode: '0644'

          - name: Enable Joomla htaccess for SEF URLs
            copy:
              src: /var/www/html/htaccess.txt
              dest: /var/www/html/.htaccess
              remote_src: yes
              owner: www-data
              group: www-data
              mode: '0644'
              force: no

          - name: Enable Joomla site, rewrite module, disable default site
            command: "{{ item }}"
            loop:
              - a2ensite joomla
              - a2enmod rewrite
              - a2dissite 000-default
            ignore_errors: yes

          - name: Restart Apache to apply configuration
            service:
              name: apache2
              state: restarted

          - name: "Show credentials summary stage"
            debug:
              msg: "Writing credentials summary to /home/ubuntu/credentials.txt"

          - name: Append Joomla credentials to credentials file
            blockinfile:
              path: /home/ubuntu/credentials.txt
              create: yes
              mode: '0600'
              marker: "# {mark} JOOMLA CREDENTIALS"
              block: |
                Joomla Admin URL: http://<server-ip>/administrator
                Joomla Admin User: admin
                Joomla Admin Password: {{ joomla_admin_password.stdout }}
                Joomla DB Name: joomla
                Joomla DB User: joomla
                Joomla DB Password: {{ joomla_db_password.stdout }}
                MariaDB root Password: {{ mysql_root_password.stdout }}

          - name: "Show verification stage"
            debug:
              msg: "Verifying that Joomla serves HTTP 200 on port 80"

          - name: Verify Joomla home page returns HTTP 200
            uri:
              url: http://localhost/
              status_code: 200
              return_content: no
            register: joomla_health
            retries: 5
            delay: 5
            until: joomla_health.status == 200
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/joomla-lamp-24-04/opt/cloudstack/joomla-lamp-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/joomla-lamp-24-04/opt/cloudstack/joomla-lamp-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/joomla-lamp-24-04_cleanup.sh && /opt/cloudstack/joomla-lamp-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
