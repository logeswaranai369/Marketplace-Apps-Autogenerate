- name: OpenLiteSpeed Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure OpenLiteSpeed
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # Block until the lock clears (and use lock_timeout on apt tasks) before installing.
          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300

          - name: Generating mysql_root_password
            shell: openssl rand -hex 24
            register: mysql_root_password

          - name: Storing mysql_root_password
            copy:
              dest: "/root/.mysql_root_password"
              content: |
                mysql_root_password = "{{ mysql_root_password.stdout }}"
          - name: Generating ols_webadmin_password
            shell: openssl rand -hex 24
            register: ols_webadmin_password

          - name: Storing ols_webadmin_password
            copy:
              dest: "/root/.ols_webadmin_password"
              content: |
                ols_webadmin_password = "{{ ols_webadmin_password.stdout }}"

          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/openlitespeed-24-04/var/www/html/index.html', confdest: '/var/www/html/'}
              - { confsrc: '/usr/local/src/openlitespeed-24-04/var/www/html/info.php', confdest: '/var/www/html/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Show OpenLiteSpeed repo setup stage
            debug:
              msg: "Configuring LiteSpeed repository..."

          - name: Detect existing LiteSpeed apt repo
            find:
              paths: /etc/apt/sources.list.d
              patterns: "lst_*.list"
            register: lst_repo_files

          - name: Add LiteSpeed repository (idempotent)
            shell: wget -O - https://repo.litespeed.sh | bash
            args:
              executable: /bin/bash
            when: lst_repo_files.matched == 0

          - name: Update apt cache after adding repo
            apt:
              update_cache: yes

          - name: Show package install stage
            debug:
              msg: "Installing OpenLiteSpeed and lsphp 8.3..."

          - name: Install OpenLiteSpeed and lsphp 8.3 (base + common bundle gd/mbstring/xml)
            apt:
              name:
                - openlitespeed
                - lsphp83
                - lsphp83-common
                - lsphp83-mysql
                - lsphp83-intl
                - lsphp83-curl
                - lsphp83-opcache
              state: latest
              lock_timeout: 300

          - name: Install MySQL 8 server and PyMySQL
            apt:
              name:
                - mysql-server
                - python3-pymysql
              state: latest
              lock_timeout: 300

          - name: Symlink lsphp83 as default lsphp for the vhost scripthandler
            file:
              src: /usr/local/lsws/lsphp83/bin/lsphp
              dest: /usr/local/lsws/fcgi-bin/lsphp5
              state: link
              force: yes

          - name: Ensure web root exists and is owned by www-data
            file:
              path: /var/www/html
              state: directory
              owner: www-data
              group: www-data
              mode: '0755'

          - name: Show OpenLiteSpeed configuration stage
            debug:
              msg: "Configuring OpenLiteSpeed listener, vhost and www-data user..."

          - name: Set OLS to run as www-data (user)
            replace:
              path: /usr/local/lsws/conf/httpd_config.conf
              regexp: '^user\s+.*'
              replace: 'user                      www-data'

          - name: Set OLS to run as www-data (group)
            replace:
              path: /usr/local/lsws/conf/httpd_config.conf
              regexp: '^group\s+.*'
              replace: 'group                     www-data'

          - name: Point the existing Default listener at port 80 (edit, never duplicate)
            replace:
              path: /usr/local/lsws/conf/httpd_config.conf
              regexp: 'address\s+\*:8088'
              replace: 'address                 *:80'

          - name: Map the Default listener to our mysite vhost
            replace:
              path: /usr/local/lsws/conf/httpd_config.conf
              regexp: 'map\s+Example\s+\*'
              replace: 'map                     mysite *'

          - name: Define the mysite virtualHost in httpd_config.conf
            blockinfile:
              path: /usr/local/lsws/conf/httpd_config.conf
              marker: "# {mark} MYSITE VHOST"
              block: |
                virtualHost mysite{
                  vhRoot                  /var/www/html/
                  configFile              conf/vhosts/mysite/vhconf.conf
                  allowSymbolLink         1
                  enableScript            1
                  restrained              0
                }

          - name: Ensure mysite vhost conf directory exists
            file:
              path: /usr/local/lsws/conf/vhosts/mysite
              state: directory
              owner: www-data
              group: www-data
              mode: '0755'

          - name: Deploy mysite vhconf.conf (index.php first, lsphp handler, rewrite)
            copy:
              dest: /usr/local/lsws/conf/vhosts/mysite/vhconf.conf
              content: |
                docRoot                   /var/www/html/
                vhDomain                  *
                index  {
                  useServer               0
                  indexFiles              index.php, index.html
                }
                scripthandler  {
                  add                     lsapi:lsphp php
                }
                extprocessor lsphp {
                  type                    lsapi
                  address                 uds://tmp/lshttpd/lsphp.sock
                  maxConns                10
                  path                    /usr/local/lsws/lsphp83/bin/lsphp
                  backlog                 100
                  instances               1
                  respBuffer              0
                }
                rewrite  {
                  enable                  1
                  rules                   <<<END_rules
                  RewriteCond %{REQUEST_FILENAME} !-f
                  RewriteCond %{REQUEST_FILENAME} !-d
                  RewriteRule ^(.*)$ /index.php [L]
                  END_rules
                }
              owner: www-data
              group: www-data
              mode: '0644'

          - name: Fix ownership of OLS runtime socket dir (else lsphp cannot start -> 503)
            file:
              path: /tmp/lshttpd
              state: directory
              owner: www-data
              group: www-data
              recurse: yes

          - name: Show WebAdmin password stage
            debug:
              msg: "Setting OpenLiteSpeed WebAdmin console password non-interactively..."

          - name: Set OLS WebAdmin password (compute hash, write htpasswd; never admpass.sh)
            shell: |
              ENCRYPT_PASS=$(/usr/local/lsws/admin/fcgi-bin/admin_php -q /usr/local/lsws/admin/misc/htpasswd.php '{{ ols_webadmin_password.stdout }}')
              echo "admin:$ENCRYPT_PASS" > /usr/local/lsws/admin/conf/htpasswd
            args:
              executable: /bin/bash

          - name: Show MySQL securing stage
            debug:
              msg: "Securing MySQL 8..."

          - name: Ensure MySQL is enabled and running
            service:
              name: mysql
              state: started
              enabled: yes

          - name: Secure MySQL 8 root (gate on auth PLUGIN, not a password login test)
            shell: |
              plugin=$(mysql -N -e "SELECT plugin FROM mysql.user WHERE user='root' AND host='localhost'" 2>/dev/null \
                || mysql -uroot -p'{{ mysql_root_password.stdout }}' -N -e "SELECT plugin FROM mysql.user WHERE user='root' AND host='localhost'" 2>/dev/null \
                || true)
              if [ "$plugin" != "mysql_native_password" ]; then
                mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password.stdout }}'; FLUSH PRIVILEGES;"
              fi
            args:
              executable: /bin/bash

          - name: Remove anonymous MySQL users
            community.mysql.mysql_user:
              login_user: root
              login_password: "{{ mysql_root_password.stdout }}"
              name: ''
              host_all: yes
              state: absent

          - name: Disallow remote root login (keep only root@localhost)
            shell: |
              mysql -uroot -p'{{ mysql_root_password.stdout }}' -e "DELETE FROM mysql.user WHERE User='root' AND Host NOT IN ('localhost','127.0.0.1','::1'); FLUSH PRIVILEGES;"
            args:
              executable: /bin/bash

          - name: Drop the test database
            community.mysql.mysql_db:
              login_user: root
              login_password: "{{ mysql_root_password.stdout }}"
              name: test
              state: absent

          - name: Show OpenLiteSpeed start stage
            debug:
              msg: "Starting OpenLiteSpeed and applying configuration..."

          - name: Ensure OpenLiteSpeed is enabled and running
            service:
              name: lsws
              state: started
              enabled: yes

          - name: Restart OpenLiteSpeed to apply all config
            command: /usr/local/lsws/bin/lswsctrl restart

          - name: Wait for OpenLiteSpeed to listen on port 80
            wait_for:
              port: 80
              host: 127.0.0.1
              timeout: 60

          - name: Verify landing page serves HTTP 200 (not the LiteSpeed Example page)
            uri:
              url: http://localhost/
              return_content: yes
              status_code: 200
            register: ols_landing
            retries: 5
            delay: 5
            until: ols_landing.status == 200

          - name: Verify PHP probe executes (OLS -> lsphp pipeline)
            uri:
              url: http://localhost/info.php
              return_content: yes
              status_code: 200
            register: ols_php_probe
            retries: 5
            delay: 5
            until: ols_php_probe.status == 200 and 'PHP OK' in ols_php_probe.content

          - name: Write operator credentials file (only after everything applied)
            copy:
              dest: /home/ubuntu/credentials.txt
              mode: '0600'
              content: |
                ===== OpenLiteSpeed LOMP Stack =====

                MySQL 8:
                  root user     : root
                  root password : {{ mysql_root_password.stdout }}
                  connect       : mysql -u root -p   (from this server)
                  note          : no application database created (bare stack).

                OpenLiteSpeed WebAdmin console:
                  URL      : https://<host>:7080
                  user     : admin
                  password : {{ ols_webadmin_password.stdout }}

                Web root : /var/www/html
                  - Drop your PHP application into /var/www/html
                  - PHP probe served at /info.php (DELETE it after verifying: rm /var/www/html/info.php)
            no_log: true

          - name: Show completion summary
            debug:
              msg: "OpenLiteSpeed LOMP stack ready. Web root /var/www/html, WebAdmin on :7080. Credentials in /home/ubuntu/credentials.txt"
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/openlitespeed-24-04/opt/cloudstack/openlitespeed-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/openlitespeed-24-04/opt/cloudstack/openlitespeed-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/openlitespeed-24-04_cleanup.sh && /opt/cloudstack/openlitespeed-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
