<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LEMP Stack Ready</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2.5rem 3rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); max-width: 520px; }
        h1 { margin-top: 0; color: #38bdf8; }
        ul { line-height: 1.8; }
        code { background: #334155; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>LEMP Stack Ready</h1>
        <p>Your base hosting stack is up and running.</p>
        <ul>
            <li><strong>Nginx</strong> — web server on port 80</li>
            <li><strong>MySQL 8</strong> — database engine (secured)</li>
            <li><strong>PHP-FPM 8.3</strong> — PHP runtime via FastCGI</li>
        </ul>
        <p>Document root: <code>/var/www/html</code>. Drop your PHP application here.</p>
    </div>
</body>
</html>
