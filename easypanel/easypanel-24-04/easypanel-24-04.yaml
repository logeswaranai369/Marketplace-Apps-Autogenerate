- name: EasyPanel Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure EasyPanel
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # STOP the apt-daily timers/services FIRST so they cannot re-acquire the lock mid-run — a
          # one-shot wait isn't enough for long installs (GitLab/BBB/desktop, ~20-40 min): the timer
          # fires again during the install and kills a later apt task with rc=100 (hit live on Ubuntu
          # Desktop). Then block until any in-progress lock clears before installing.
          - name: Stop apt-daily timers/services so they can't grab the dpkg lock mid-install
            shell: |
              systemctl stop apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
              systemctl stop apt-daily.service apt-daily-upgrade.service unattended-upgrades.service 2>/dev/null || true
              systemctl kill --kill-who=all apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
              exit 0
            changed_when: false

          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300



          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Show EasyPanel install stage
            debug:
              msg: "Installing EasyPanel (Docker Swarm based control panel) via official installer."

          - name: Check if EasyPanel is already installed
            stat:
              path: /etc/easypanel/data/data.mdb
            register: easypanel_installed

          # The official installer sets up Docker (from Docker's own codename-aware apt repo,
          # works on 20.04/22.04/24.04), runs `docker swarm init`, pulls Traefik + easypanel
          # images and runs `easypanel setup`. It ABORTS if 80/443 are already in use, so this
          # must run on a clean VM. It takes ~2-4 min (image pulls) -> generous async + poll.
          # Run in a CLEAN root env (env -i) so leftover SUDO_* vars from become/sudo can't trip
          # any root-check the installer performs.
          - name: Install EasyPanel (Docker Swarm services easypanel + easypanel-traefik)
            shell: >
              env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              HOME=/root TERM=xterm
              bash -c "curl -sSL https://get.easypanel.io | sh"
            args:
              executable: /bin/bash
            async: 900
            poll: 15
            register: easypanel_install
            when: not easypanel_installed.stat.exists

          - name: Show EasyPanel installer output
            debug:
              var: easypanel_install.stdout_lines
            when: easypanel_install is not skipped

          - name: Ensure Docker service is enabled and running
            service:
              name: docker
              state: started
              enabled: yes

          - name: Show swarm verification stage
            debug:
              msg: "Verifying EasyPanel swarm services have converged."

          # EasyPanel runs as Docker Swarm services, NOT a systemd unit. Confirm the services
          # exist and converge (retries: swarm scheduling + image pulls can take a bit).
          - name: Wait for EasyPanel swarm services to be present and running (1/1)
            shell: |
              docker service ls --filter name=easypanel --format '{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.Replicas{{ '}}' }}'
            register: ep_services
            changed_when: false
            retries: 20
            delay: 15
            until: >
              ('easypanel ' in ep_services.stdout) and
              ('1/1' in ep_services.stdout)

          - name: Show EasyPanel swarm service status
            debug:
              var: ep_services.stdout_lines

          - name: Show credentials-file stage
            debug:
              msg: "Writing EasyPanel access instructions to /home/ubuntu/credentials.txt"

          - name: Ensure /home/ubuntu exists
            file:
              path: /home/ubuntu
              state: directory
              owner: ubuntu
              group: ubuntu
              mode: '0755'
            ignore_errors: yes

          # There is NO headless admin CLI — the FIRST visitor to the /setup page becomes the
          # admin. So no admin password is generated/injected; instead document the one-time
          # web setup step for the operator.
          - name: Write EasyPanel access instructions
            copy:
              dest: /home/ubuntu/credentials.txt
              owner: ubuntu
              group: ubuntu
              mode: '0600'
              content: |
                EasyPanel is installed. Open http://<server-ip>:3000 in your browser and CREATE YOUR ADMIN ACCOUNT NOW (the first visitor to the setup page becomes the admin — do this immediately and restrict port 3000 to your IP until you have). Open 3000/tcp (panel) and 80/443 (apps you host). Config/data live in /etc/easypanel. To reset the admin password later: docker run --rm -v /etc/easypanel:/etc/easypanel -v /var/run/docker.sock:/var/run/docker.sock:ro easypanel/easypanel reset-password <email>.

          - name: Wait for the EasyPanel web panel to serve on port 3000
            uri:
              url: http://localhost:3000/
              status_code: 200
              validate_certs: no
            register: ep_http
            retries: 20
            delay: 15
            until: ep_http.status == 200

          - name: Show EasyPanel readiness
            debug:
              msg: "EasyPanel panel is serving on http://<server-ip>:3000/ — complete the /setup page to create the admin."
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/easypanel-24-04/opt/cloudstack/easypanel-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/easypanel-24-04/opt/cloudstack/easypanel-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/easypanel-24-04_cleanup.sh && /opt/cloudstack/easypanel-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
