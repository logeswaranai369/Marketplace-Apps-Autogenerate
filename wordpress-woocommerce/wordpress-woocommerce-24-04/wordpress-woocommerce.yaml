- name: wordpress+woocommerce Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure wordpress+woocommerce
        block:
          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes

          - name: Generating mariadb_root_password
            shell: openssl rand -hex 24
            register: mariadb_root_password

          - name: Storing mariadb_root_password
            copy:
              dest: "/root/.mariadb_root_password"
              content: |
                mariadb_root_password = "{{ mariadb_root_password.stdout }}"
          - name: Generating wordpress_db_password
            shell: openssl rand -hex 24
            register: wordpress_db_password

          - name: Storing wordpress_db_password
            copy:
              dest: "/root/.wordpress_db_password"
              content: |
                wordpress_db_password = "{{ wordpress_db_password.stdout }}"
          - name: Generating wordpress_admin_password
            shell: openssl rand -hex 24
            register: wordpress_admin_password

          - name: Storing wordpress_admin_password
            copy:
              dest: "/root/.wordpress_admin_password"
              content: |
                wordpress_admin_password = "{{ wordpress_admin_password.stdout }}"

          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/wordpress-woocommerce-24-04/etc/apache2/sites-available/wordpress.conf', confdest: '/etc/apache2/sites-available/'}
              - { confsrc: '/usr/local/src/wordpress-woocommerce-24-04/var/www/html/wordpress/.htaccess', confdest: '/var/www/html/wordpress/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Install LAMP stack and required packages
            package:
              name:
                - apache2
                - mariadb-server
                - php
                - libapache2-mod-php
                - php-mysql
                - php-curl
                - php-gd
                - php-mbstring
                - php-xml
                - php-zip
                - python3-pymysql
                - curl
                - unzip
              state: latest

          - name: Ensure Apache and MariaDB are enabled and running
            service:
              name: "{{ item }}"
              state: started
              enabled: yes
            loop:
              - apache2
              - mariadb

          - name: Secure MariaDB root (password + keep socket auth; no lockout)
            shell: |
              mysql -u root <<'SQL'
              ALTER USER 'root'@'localhost' IDENTIFIED VIA mysql_native_password USING PASSWORD('{{ mariadb_root_password.stdout }}') OR unix_socket;
              FLUSH PRIVILEGES;
              SQL
            args:
              executable: /bin/bash

          - name: Create WordPress database
            community.mysql.mysql_db:
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: wordpress
              state: present

          - name: Create WordPress database user
            community.mysql.mysql_user:
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: wordpress
              password: "{{ wordpress_db_password.stdout }}"
              host: localhost
              priv: "wordpress.*:ALL"
              state: present

          - name: Stage - download WordPress core
            debug:
              msg: "Downloading WordPress core..."

          - name: Ensure WordPress install directory exists
            file:
              path: /var/www/html/wordpress
              state: directory
              owner: www-data
              group: www-data
              mode: '0755'

          - name: Download latest WordPress tarball
            get_url:
              url: https://wordpress.org/latest.tar.gz
              dest: /tmp/wordpress-latest.tar.gz
              mode: '0644'

          - name: Check if WordPress core is already extracted
            stat:
              path: /var/www/html/wordpress/wp-settings.php
            register: wp_installed

          - name: Extract WordPress to web root
            unarchive:
              src: /tmp/wordpress-latest.tar.gz
              dest: /var/www/html/wordpress
              remote_src: yes
              extra_opts:
                - --strip-components=1
              owner: www-data
              group: www-data
            when: not wp_installed.stat.exists

          - name: Create wp-config.php from sample
            copy:
              src: /var/www/html/wordpress/wp-config-sample.php
              dest: /var/www/html/wordpress/wp-config.php
              remote_src: yes
              owner: www-data
              group: www-data
              mode: '0640'
              force: no

          - name: Set DB name in wp-config (real value)
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'DB_NAME',\\s*'[^']*'\\s*\\);"
              replace: "define( 'DB_NAME', 'wordpress' );"

          - name: Set DB user in wp-config (real value)
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'DB_USER',\\s*'[^']*'\\s*\\);"
              replace: "define( 'DB_USER', 'wordpress' );"

          - name: Set DB password in wp-config (real value, never a placeholder)
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'DB_PASSWORD',\\s*'[^']*'\\s*\\);"
              replace: "define( 'DB_PASSWORD', '{{ wordpress_db_password.stdout }}' );"

          - name: Make WordPress URL-agnostic (serve on whatever host the browser used)
            blockinfile:
              path: /var/www/html/wordpress/wp-config.php
              marker: "// {mark} MARKGEN DYNAMIC SITE URL"
              insertbefore: "/\\* That's all, stop editing"
              block: |
                if ( isset( $_SERVER['HTTP_HOST'] ) ) {
                    $markgen_scheme = ( ! empty( $_SERVER['HTTPS'] ) && $_SERVER['HTTPS'] !== 'off' ) ? 'https' : 'http';
                    define( 'WP_HOME', $markgen_scheme . '://' . $_SERVER['HTTP_HOST'] );
                    define( 'WP_SITEURL', $markgen_scheme . '://' . $_SERVER['HTTP_HOST'] );
                }

          - name: Ensure fresh WordPress salts are set
            replace:
              path: /var/www/html/wordpress/wp-config.php
              regexp: "define\\(\\s*'{{ item }}',\\s*'put your unique phrase here'\\s*\\);"
              replace: "define( '{{ item }}', '{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}' );"
            loop:
              - AUTH_KEY
              - SECURE_AUTH_KEY
              - LOGGED_IN_KEY
              - NONCE_KEY
              - AUTH_SALT
              - SECURE_AUTH_SALT
              - LOGGED_IN_SALT
              - NONCE_SALT

          - name: Ensure correct ownership of WordPress install dir
            file:
              path: /var/www/html/wordpress
              state: directory
              owner: www-data
              group: www-data
              recurse: yes

          - name: Stage - configure Apache vhost
            debug:
              msg: "Deploying Apache virtual host for WordPress..."

          - name: Deploy Apache virtual host (DocumentRoot matches extract path)
            copy:
              dest: /etc/apache2/sites-available/wordpress.conf
              content: |
                <VirtualHost *:80>
                    ServerAdmin webmaster@localhost
                    DocumentRoot /var/www/html/wordpress

                    <Directory /var/www/html/wordpress>
                        Options FollowSymLinks
                        AllowOverride All
                        Require all granted
                    </Directory>

                    ErrorLog ${APACHE_LOG_DIR}/wordpress_error.log
                    CustomLog ${APACHE_LOG_DIR}/wordpress_access.log combined
                </VirtualHost>
              mode: '0644'

          - name: Enable site, rewrite module, disable default site
            command: "{{ item }}"
            loop:
              - a2ensite wordpress
              - a2enmod rewrite
              - a2dissite 000-default
            ignore_errors: yes

          - name: Reload Apache to apply configuration
            service:
              name: apache2
              state: reloaded

          - name: Stage - complete WordPress setup with WP-CLI
            debug:
              msg: "Completing WordPress first-run setup and installing WooCommerce..."

          - name: Download WP-CLI
            get_url:
              url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              dest: /usr/local/bin/wp
              mode: '0755'

          - name: Check if WordPress setup is already complete
            command: wp core is-installed --path=/var/www/html/wordpress --allow-root
            register: wp_core_installed
            failed_when: false
            changed_when: false

          - name: Complete first-run setup so the site actually SERVES (health check needs 2xx)
            command: >
              wp core install
              --path=/var/www/html/wordpress
              --url=http://localhost/
              --title="WordPress WooCommerce Store"
              --admin_user=admin
              --admin_password='{{ wordpress_admin_password.stdout }}'
              --admin_email=admin@localhost.local
              --skip-email
              --allow-root
            when: wp_core_installed.rc != 0

          - name: Set pretty permalinks (required by WooCommerce) BEFORE plugin install
            command: wp rewrite structure '/%postname%/' --path=/var/www/html/wordpress --allow-root
            changed_when: false

          - name: Install and activate WooCommerce plugin
            command: wp plugin install woocommerce --activate --path=/var/www/html/wordpress --allow-root
            register: woo_install
            changed_when: "'Plugin already installed' not in woo_install.stdout"

          - name: Ensure ownership after WP-CLI operations
            file:
              path: /var/www/html/wordpress
              state: directory
              owner: www-data
              group: www-data
              recurse: yes

          - name: Write credentials file for the operator
            copy:
              dest: /home/ubuntu/credentials.txt
              owner: ubuntu
              group: ubuntu
              mode: '0600'
              content: |
                WordPress + WooCommerce Credentials
                MariaDB root password : {{ mariadb_root_password.stdout }}
                WordPress DB name      : wordpress
                WordPress DB user      : wordpress
                WordPress DB password  : {{ wordpress_db_password.stdout }}
                WordPress admin user   : admin
                WordPress admin pass   : {{ wordpress_admin_password.stdout }}
                WordPress admin email  : admin@localhost.local
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/wordpress-woocommerce-24-04/opt/cloudstack/wordpress-woocommerce_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/wordpress-woocommerce-24-04/opt/cloudstack/wordpress-woocommerce_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/wordpress-woocommerce_cleanup.sh && /opt/cloudstack/wordpress-woocommerce_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
