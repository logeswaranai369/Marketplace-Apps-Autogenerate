<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/lhc

    <Directory /var/www/lhc>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/lhc_error.log
    CustomLog ${APACHE_LOG_DIR}/lhc_access.log combined
</VirtualHost>
