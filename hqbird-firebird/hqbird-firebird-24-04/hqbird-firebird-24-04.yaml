- name: HQbird Firebird Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure HQbird Firebird
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # Block until the lock clears (and use lock_timeout on apt tasks) before installing.
          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300

          - name: Generating sysdba_password
            shell: openssl rand -hex 24
            register: sysdba_password

          - name: Storing sysdba_password
            copy:
              dest: "/root/.sysdba_password"
              content: |
                sysdba_password = "{{ sysdba_password.stdout }}"


          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Install Java runtime and tools for HQbird
            apt:
              name:
                - openjdk-8-jre-headless
                - curl
              state: latest
              lock_timeout: 300

          - name: Install Firebird 5.0 native library dependencies
            apt:
              name:
                - libtommath1
                - libtomcrypt1
                - libncurses6
              state: latest
              lock_timeout: 300

          - name: Show library compat stage message
            debug:
              msg: "Creating libtommath.so.0 compat symlink (Firebird 5.0 loads .so.0, noble ships .so.1)"

          - name: Create libtommath.so.0 compatibility symlink
            file:
              src: /lib/x86_64-linux-gnu/libtommath.so.1
              dest: /lib/x86_64-linux-gnu/libtommath.so.0
              state: link
              force: yes

          - name: Refresh linker cache
            command: ldconfig
            changed_when: false

          - name: Show download stage message
            debug:
              msg: "Downloading HQbird installer (~532MB) from ib-aid.com"

          - name: Check if HQbird is already installed
            stat:
              path: /opt/fb50/bin/isql
            register: hqbird_installed

          - name: Download HQbird installer
            get_url:
              url: https://cc.ib-aid.com/download/distr/install.sh
              dest: /root/hqbird-install.sh
              mode: '0755'
            when: not hqbird_installed.stat.exists

          - name: Show install stage message
            debug:
              msg: "Running HQbird installer (--fb50 --ignorefbrunning) — extracts ~2GB, may take 1-3 minutes"

          - name: Run HQbird installer (non-interactive, long-running)
            command: bash /root/hqbird-install.sh --fb50 --ignorefbrunning
            args:
              creates: /opt/fb50/bin/isql
            async: 1800
            poll: 30
            when: not hqbird_installed.stat.exists

          - name: Verify Firebird 5.0 binary is present after install
            stat:
              path: /opt/fb50/bin/isql
            register: fb_isql_check

          - name: Fail if HQbird install did not complete
            fail:
              msg: "HQbird install failed — /opt/fb50/bin/isql not found"
            when: not fb_isql_check.stat.exists

          - name: Show service enable stage message
            debug:
              msg: "Enabling and starting Firebird 5.0 + HQbird services (installer leaves them disabled)"

          - name: Enable and start HQbird services at boot
            systemd:
              name: "{{ item }}"
              enabled: yes
              state: started
            loop:
              - firebird.opt_fb50
              - hqbird
              - fbcclauncher
              - fbcctracehorse
              - fbccamv2

          # The generated secret is 48 hex chars (openssl rand -hex 24); Firebird SRP auth needs the
          # SYSDBA password <=31 chars. Truncate ONCE and reuse everywhere so the stored/documented
          # password is exactly the one that actually works remotely.
          - name: Derive SRP-safe SYSDBA password (<=31 chars)
            set_fact:
              sysdba_pw: "{{ sysdba_password.stdout[:31] }}"

          - name: Show SYSDBA password stage message
            debug:
              msg: "Setting SYSDBA password for remote TCP (SRP) access via embedded gsec"

          - name: Stop Firebird server before setting SYSDBA password
            systemd:
              name: firebird.opt_fb50
              state: stopped

          - name: Set SYSDBA password with embedded gsec
            command: >
              /opt/fb50/bin/gsec -user SYSDBA -password x -modify SYSDBA
              -pw "{{ sysdba_pw }}" -database /opt/fb50/security5.fdb
            register: gsec_result

          - name: Start Firebird server after password change
            systemd:
              name: firebird.opt_fb50
              state: started

          - name: Show verification stage message
            debug:
              msg: "Verifying Firebird 5.0 serves over TCP (isql SELECT ENGINE_VERSION against localhost:employee)"

          - name: Wait for Firebird to listen on TCP 3050
            wait_for:
              host: 127.0.0.1
              port: 3050
              timeout: 60

          - name: Connect over TCP and read engine version
            shell: |
              echo "SELECT rdb\$get_context('SYSTEM','ENGINE_VERSION') FROM rdb\$database;" | \
              TERM=dumb /opt/fb50/bin/isql -user SYSDBA -password "{{ sysdba_pw }}" localhost:employee
            register: fb_version
            retries: 5
            delay: 10
            until: fb_version.rc == 0 and '5.0' in fb_version.stdout
            changed_when: false

          - name: Show engine version
            debug:
              msg: "Firebird engine version reported: {{ fb_version.stdout }}"

          - name: Write credentials file
            copy:
              dest: /home/ubuntu/credentials.txt
              mode: '0600'
              content: |
                HQbird Firebird 5.0 (IBSurgeon) — 30-DAY TRIAL
                Firebird server : <public-ip>:3050
                User            : SYSDBA
                Password        : {{ sysdba_pw }}
                Sample DB alias : employee   (e.g. isql localhost:employee)

                HQbird monitoring web UI (auth-required):
                  http://<public-ip>:8082/
                  http://<public-ip>:8083/

                NOTE: This is a COMMERCIAL product on a 30-DAY TRIAL.
                Apply a purchased license post-deploy:
                  https://ib-aid.com/en/hqbird-license/
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/hqbird-firebird-24-04/opt/cloudstack/hqbird-firebird-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/hqbird-firebird-24-04/opt/cloudstack/hqbird-firebird-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/hqbird-firebird-24-04_cleanup.sh && /opt/cloudstack/hqbird-firebird-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
