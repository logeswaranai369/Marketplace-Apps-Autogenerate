- name: Moodle Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure Moodle
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # Block until the lock clears (and use lock_timeout on apt tasks) before installing.
          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300

          - name: Generating mysql_root_password
            shell: openssl rand -hex 24
            register: mysql_root_password

          - name: Storing mysql_root_password
            copy:
              dest: "/root/.mysql_root_password"
              content: |
                mysql_root_password = "{{ mysql_root_password.stdout }}"
          - name: Generating moodle_db_password
            shell: openssl rand -hex 24
            register: moodle_db_password

          - name: Storing moodle_db_password
            copy:
              dest: "/root/.moodle_db_password"
              content: |
                moodle_db_password = "{{ moodle_db_password.stdout }}"
          - name: Generating moodle_admin_password
            shell: openssl rand -hex 24
            register: moodle_admin_password

          - name: Storing moodle_admin_password
            copy:
              dest: "/root/.moodle_admin_password"
              content: |
                moodle_admin_password = "{{ moodle_admin_password.stdout }}"

          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/moodle-24-04/etc/apache2/conf-available/moodle.conf', confdest: '/etc/apache2/conf-available/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Add ondrej/php PPA for PHP 8.3
            apt_repository:
              repo: ppa:ondrej/php
              state: present
              update_cache: yes

          - name: Install Apache web server
            apt:
              name:
                - apache2
              state: latest
              lock_timeout: 300

          - name: Install PHP 8.3 and required extensions
            apt:
              name:
                - libapache2-mod-php8.3
                - php8.3-cli
                - php8.3-mysql
                - php8.3-xml
                - php8.3-mbstring
                - php8.3-curl
                - php8.3-gd
                - php8.3-intl
                - php8.3-zip
                - php8.3-soap
                - php8.3-xmlrpc
                - php8.3-bcmath
              state: latest
              lock_timeout: 300

          - name: Install MySQL 8 server and PyMySQL
            apt:
              name:
                - mysql-server
                - python3-pymysql
              state: latest
              lock_timeout: 300

          - name: Ensure Apache and MySQL are enabled and running
            service:
              name: "{{ item }}"
              state: started
              enabled: yes
            loop:
              - apache2
              - mysql

          - name: "Stage 1 - configure PHP settings for Apache and CLI"
            debug:
              msg: "Setting max_input_vars and memory_limit in PHP ini files"

          # The default line is ';max_input_vars = 1000' (commented). Uncomment + set it.
          - name: Set max_input_vars in Apache php.ini
            lineinfile:
              path: /etc/php/8.3/apache2/php.ini
              regexp: '^;?\s*max_input_vars\s*='
              line: 'max_input_vars = 5000'

          - name: Set memory_limit in Apache php.ini
            lineinfile:
              path: /etc/php/8.3/apache2/php.ini
              regexp: '^;?\s*memory_limit\s*='
              line: 'memory_limit = 256M'

          - name: Set max_input_vars in CLI php.ini
            lineinfile:
              path: /etc/php/8.3/cli/php.ini
              regexp: '^;?\s*max_input_vars\s*='
              line: 'max_input_vars = 5000'

          - name: "Stage 2 - secure MySQL 8 root over the socket (must run FIRST)"
            debug:
              msg: "Setting MySQL root password via auth_socket while it still works"

          # MySQL 8 fresh install: root uses auth_socket. Set the password over the socket NOW,
          # while socket auth still works. After this, socket auth is REPLACED — all further
          # DB admin MUST use login_user/login_password.
          - name: Check if MySQL root password is already set
            shell: mysql -u root -e "SELECT 1;" 2>/dev/null
            register: mysql_socket_ok
            changed_when: false
            failed_when: false

          - name: Set MySQL root password (mysql_native_password) over the socket
            shell: |
              mysql -u root <<'SQL'
              ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ mysql_root_password.stdout }}';
              FLUSH PRIVILEGES;
              SQL
            args:
              executable: /bin/bash
            when: mysql_socket_ok.rc == 0

          - name: "Stage 3 - create Moodle database and user"
            debug:
              msg: "Creating moodle database and user (auth with root password)"

          - name: Create Moodle database
            community.mysql.mysql_db:
              login_user: root
              login_password: "{{ mysql_root_password.stdout }}"
              name: moodle
              encoding: utf8mb4
              collation: utf8mb4_unicode_ci
              state: present

          - name: Create Moodle database user
            community.mysql.mysql_user:
              login_user: root
              login_password: "{{ mysql_root_password.stdout }}"
              name: moodle
              password: "{{ moodle_db_password.stdout }}"
              host: localhost
              plugin: mysql_native_password
              priv: "moodle.*:ALL"
              state: present

          - name: "Stage 4 - download and extract Moodle 4.5 LTS"
            debug:
              msg: "Downloading Moodle 4.5 stable405 tarball"

          - name: Download Moodle tarball
            get_url:
              url: https://download.moodle.org/download.php/direct/stable405/moodle-latest-405.tgz
              dest: /tmp/moodle-latest-405.tgz
              mode: '0644'

          - name: Remove Apache default index.html
            file:
              path: /var/www/html/index.html
              state: absent

          - name: Check if Moodle is already extracted
            stat:
              path: /var/www/html/admin/cli/install.php
            register: moodle_extracted

          - name: Extract Moodle contents into web root
            unarchive:
              src: /tmp/moodle-latest-405.tgz
              dest: /var/www/html
              remote_src: yes
              extra_opts:
                - --strip-components=1
              owner: www-data
              group: www-data
            when: not moodle_extracted.stat.exists

          - name: Create Moodle dataroot outside webroot
            file:
              path: /var/moodledata
              state: directory
              owner: www-data
              group: www-data
              mode: '0770'

          - name: Ensure ownership of web root and dataroot
            file:
              path: "{{ item }}"
              state: directory
              owner: www-data
              group: www-data
              recurse: yes
            loop:
              - /var/www/html
              - /var/moodledata

          - name: "Stage 5 - configure Apache for Moodle"
            debug:
              msg: "Enabling rewrite module and AllowOverride config"

          - name: Deploy Moodle Apache config (AllowOverride All)
            copy:
              dest: /etc/apache2/conf-available/moodle.conf
              content: |
                <Directory /var/www/html>
                    Options FollowSymLinks
                    AllowOverride All
                    Require all granted
                </Directory>
              mode: '0644'

          - name: Enable rewrite module and Moodle config
            command: "{{ item }}"
            loop:
              - a2enmod rewrite
              - a2enconf moodle
            register: apache_enable
            changed_when: "'already enabled' not in apache_enable.stdout"

          - name: Restart Apache to apply configuration
            service:
              name: apache2
              state: restarted

          - name: "Stage 6 - run Moodle CLI installer (non-interactive)"
            debug:
              msg: "Running admin/cli/install.php with max_input_vars via -d"

          - name: Check if Moodle is already installed
            stat:
              path: /var/www/html/config.php
            register: moodle_config

          # The CLI SAPI reads a different php.ini, so pass max_input_vars directly with -d.
          # wwwroot uses localhost as a bootstrap seed for the local health check; made dynamic below.
          - name: Install Moodle via CLI
            command: >
              sudo -u www-data php -d max_input_vars=5000 admin/cli/install.php
              --lang=en
              --wwwroot=http://localhost/
              --dataroot=/var/moodledata
              --dbtype=mysqli
              --dbhost=localhost
              --dbname=moodle
              --dbuser=moodle
              --dbpass='{{ moodle_db_password.stdout }}'
              --prefix=mdl_
              --fullname="Moodle Site"
              --shortname="Moodle"
              --adminuser=admin
              --adminpass='{{ moodle_admin_password.stdout }}'
              --adminemail=admin@localhost.local
              --non-interactive
              --agree-license
            args:
              chdir: /var/www/html
            when: not moodle_config.stat.exists

          - name: "Stage 7 - make wwwroot dynamic (CloudStack NAT / URL-agnostic)"
            debug:
              msg: "Deriving wwwroot from the request Host header"

          # The public URL is unknown at install time (CloudStack NAT). Moodle hard-redirects on a
          # wwwroot mismatch, so derive it from the browser's Host header at runtime.
          - name: Insert dynamic wwwroot into config.php
            blockinfile:
              path: /var/www/html/config.php
              marker: "// {mark} MARKGEN DYNAMIC WWWROOT"
              insertbefore: "require_once\\(__DIR__ \\. '/lib/setup.php'\\);"
              block: |
                $CFG->wwwroot = (empty($_SERVER['HTTPS']) || $_SERVER['HTTPS'] === 'off' ? 'http' : 'https') . '://' . ($_SERVER['HTTP_HOST'] ?? 'localhost');

          - name: Restore config.php ownership
            file:
              path: /var/www/html/config.php
              owner: www-data
              group: www-data

          - name: "Stage 8 - write credentials file"
            debug:
              msg: "Writing /home/ubuntu/credentials.txt"

          - name: Write credentials file
            copy:
              dest: /home/ubuntu/credentials.txt
              mode: '0600'
              content: |
                Moodle Site Credentials
                Site URL (served on whatever host you browse to; wwwroot is dynamic)
                If dynamic wwwroot is flaky, hardcode $CFG->wwwroot in /var/www/html/config.php.

                Admin login:
                  username: admin
                  password: {{ moodle_admin_password.stdout }}
                  email:    admin@localhost.local

                Database:
                  db name:  moodle
                  db user:  moodle
                  db pass:  {{ moodle_db_password.stdout }}
                  root pass: {{ mysql_root_password.stdout }}

          - name: "Stage 9 - verify Moodle front page returns 200"
            uri:
              url: http://localhost/
              follow_redirects: all
              status_code: 200
              return_content: yes
            register: moodle_health
            retries: 5
            delay: 10
            until: moodle_health.status == 200
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/moodle-24-04/opt/cloudstack/moodle-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/moodle-24-04/opt/cloudstack/moodle-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/moodle-24-04_cleanup.sh && /opt/cloudstack/moodle-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
