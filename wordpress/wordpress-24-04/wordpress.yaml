- name: wordpress Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Updating Packages
        ansible.builtin.apt:
          update_cache: yes

      - name: Generating mysql_root_password
        shell: openssl rand -hex 24
        register: mysql_root_password

      - name: Storing mysql_root_password
        copy:
          dest: "/root/.mysql_root_password"
          content: |
            mysql_root_password = "{{ mysql_root_password.stdout }}"
      - name: Generating wordpress_db_password
        shell: openssl rand -hex 24
        register: wordpress_db_password

      - name: Storing wordpress_db_password
        copy:
          dest: "/root/.wordpress_db_password"
          content: |
            wordpress_db_password = "{{ wordpress_db_password.stdout }}"
      - name: Generating wordpress_admin_password
        shell: openssl rand -hex 24
        register: wordpress_admin_password

      - name: Storing wordpress_admin_password
        copy:
          dest: "/root/.wordpress_admin_password"
          content: |
            wordpress_admin_password = "{{ wordpress_admin_password.stdout }}"

      - name: Copy staged config files
        copy:
          src: "{{ item.confsrc }}"
          dest: "{{ item.confdest }}"
        with_items:
          - { confsrc: '/usr/local/src/wordpress-24-04/etc/apache2/sites-available/wordpress.conf', confdest: '/etc/apache2/sites-available/'}

      # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
      - name: Install LAMP stack and required PHP extensions for WordPress
        package:
          name:
            - apache2
            - mariadb-server
            - php
            - libapache2-mod-php
            - php-mysql
            - php-curl
            - php-gd
            - php-mbstring
            - php-xml
            - php-xmlrpc
            - php-soap
            - php-intl
            - php-zip
            - wget
            - tar
            - python3-pymysql
          state: latest

      - name: Ensure Apache and MariaDB are enabled and running
        service:
          name: "{{ item }}"
          state: started
          enabled: yes
        loop:
          - apache2
          - mariadb

      - name: Secure MariaDB root account with generated password
        community.mysql.mysql_user:
          login_unix_socket: /var/run/mysqld/mysqld.sock
          name: root
          host: "{{ item }}"
          password: "{{ mysql_root_password.stdout }}"
          check_implicit_admin: yes
          state: present
        loop:
          - localhost
          - 127.0.0.1
          - "::1"
        ignore_errors: yes

      - name: Debug - creating WordPress database and user
        debug:
          msg: "Creating WordPress database and application user"

      - name: Create WordPress database
        community.mysql.mysql_db:
          login_user: root
          login_password: "{{ mysql_root_password.stdout }}"
          login_unix_socket: /var/run/mysqld/mysqld.sock
          name: wordpress
          state: present

      - name: Create WordPress database user
        community.mysql.mysql_user:
          login_user: root
          login_password: "{{ mysql_root_password.stdout }}"
          login_unix_socket: /var/run/mysqld/mysqld.sock
          name: wordpress
          password: "{{ wordpress_db_password.stdout }}"
          host: localhost
          priv: "wordpress.*:ALL"
          state: present

      - name: Debug - downloading WordPress core
        debug:
          msg: "Downloading latest WordPress core tarball"

      - name: Download latest WordPress tarball
        get_url:
          url: https://wordpress.org/latest.tar.gz
          dest: /tmp/wordpress-latest.tar.gz
          mode: '0644'

      - name: Ensure WordPress web root exists
        file:
          path: /var/www/wordpress
          state: directory
          owner: www-data
          group: www-data
          mode: '0755'

      - name: Check if WordPress is already extracted
        stat:
          path: /var/www/wordpress/wp-settings.php
        register: wp_installed

      - name: Extract WordPress core to web root
        unarchive:
          src: /tmp/wordpress-latest.tar.gz
          dest: /var/www/wordpress
          remote_src: yes
          extra_opts:
            - --strip-components=1
          owner: www-data
          group: www-data
        when: not wp_installed.stat.exists

      - name: Ensure correct ownership of WordPress files
        file:
          path: /var/www/wordpress
          state: directory
          owner: www-data
          group: www-data
          recurse: yes

      - name: Debug - generating wp-config.php
        debug:
          msg: "Generating wp-config.php with DB credentials and fresh salts"

      - name: Fetch fresh WordPress salts from API
        uri:
          url: https://api.wordpress.org/secret-key/1.1/salt/
          return_content: yes
        register: wp_salts
        ignore_errors: yes

      - name: Create wp-config.php from sample
        copy:
          src: /var/www/wordpress/wp-config-sample.php
          dest: /var/www/wordpress/wp-config.php
          remote_src: yes
          owner: www-data
          group: www-data
          mode: '0640'
          force: no

      - name: Set database name in wp-config.php
        replace:
          path: /var/www/wordpress/wp-config.php
          regexp: "define\\(\\s*'DB_NAME',\\s*'[^']*'\\s*\\);"
          replace: "define( 'DB_NAME', 'wordpress' );"

      - name: Set database user in wp-config.php
        replace:
          path: /var/www/wordpress/wp-config.php
          regexp: "define\\(\\s*'DB_USER',\\s*'[^']*'\\s*\\);"
          replace: "define( 'DB_USER', 'wordpress' );"

      - name: Set database password in wp-config.php
        replace:
          path: /var/www/wordpress/wp-config.php
          regexp: "define\\(\\s*'DB_PASSWORD',\\s*'[^']*'\\s*\\);"
          replace: "define( 'DB_PASSWORD', '{{ wordpress_db_password.stdout }}' );"

      - name: Inject fresh salts into wp-config.php
        block:
          - name: Remove default salt definitions
            lineinfile:
              path: /var/www/wordpress/wp-config.php
              regexp: "define\\(\\s*'(AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY|AUTH_SALT|SECURE_AUTH_SALT|LOGGED_IN_SALT|NONCE_SALT)'.*"
              state: absent

          - name: Insert fetched salts into wp-config.php
            blockinfile:
              path: /var/www/wordpress/wp-config.php
              marker: "// {mark} WORDPRESS SALTS"
              insertbefore: "\\$table_prefix"
              block: "{{ wp_salts.content }}"
        when: wp_salts is succeeded and wp_salts.content is defined

      - name: Debug - configuring Apache virtual host
        debug:
          msg: "Configuring Apache virtual host for WordPress"

      - name: Deploy WordPress Apache virtual host
        copy:
          dest: /etc/apache2/sites-available/wordpress.conf
          content: |
            <VirtualHost *:80>
                ServerName localhost
                DocumentRoot /var/www/wordpress

                <Directory /var/www/wordpress>
                    Options FollowSymLinks
                    AllowOverride All
                    Require all granted
                </Directory>

                ErrorLog ${APACHE_LOG_DIR}/wordpress_error.log
                CustomLog ${APACHE_LOG_DIR}/wordpress_access.log combined
            </VirtualHost>
          owner: root
          group: root
          mode: '0644'

      - name: Enable WordPress site
        command: a2ensite wordpress
        register: a2ensite_result
        changed_when: "'already enabled' not in a2ensite_result.stdout"

      - name: Enable Apache rewrite module
        command: a2enmod rewrite
        register: a2enmod_result
        changed_when: "'already enabled' not in a2enmod_result.stdout"

      - name: Disable default Apache site
        command: a2dissite 000-default
        register: a2dissite_result
        changed_when: "'already disabled' not in a2dissite_result.stdout"
        ignore_errors: yes

      - name: Reload Apache to apply configuration
        service:
          name: apache2
          state: reloaded

      - name: Debug - installing WP-CLI and completing WordPress setup
        debug:
          msg: "Installing WP-CLI and completing WordPress installation"

      - name: Download WP-CLI
        get_url:
          url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          dest: /usr/local/bin/wp
          mode: '0755'

      - name: Check if WordPress installation is already complete
        command: wp core is-installed --path=/var/www/wordpress --allow-root
        register: wp_core_installed
        failed_when: false
        changed_when: false

      - name: Complete WordPress core installation via WP-CLI
        command: >
          wp core install
          --path=/var/www/wordpress
          --url=http://localhost/
          --title="WordPress Site"
          --admin_user=admin
          --admin_password='{{ wordpress_admin_password.stdout }}'
          --admin_email=admin@localhost.local
          --skip-email
          --allow-root
        when: wp_core_installed.rc != 0

      - name: Write credentials file for operator
        copy:
          dest: /home/ubuntu/credentials.txt
          content: |
            WordPress Admin URL: http://localhost/wp-admin/
            WordPress Admin User: admin
            WordPress Admin Password: {{ wordpress_admin_password.stdout }}

            Database Name: wordpress
            Database User: wordpress
            Database Password: {{ wordpress_db_password.stdout }}
            MySQL Root Password: {{ mysql_root_password.stdout }}
          owner: ubuntu
          group: ubuntu
          mode: '0600'

      - name: Configure firewall rules for HTTP and HTTPS (if ufw present)
        ufw:
          rule: allow
          port: "{{ item }}"
          proto: tcp
        loop:
          - "80"
          - "443"
        ignore_errors: yes
      # ----- END app-specific tasks -----

      - name: Creating /opt/cloudstack directory
        ansible.builtin.file:
          path: /opt/cloudstack
          state: directory

      - name: Copy cleanup + update helper scripts
        copy:
          src: "{{ item.confsrc }}"
          dest: "{{ item.confdest }}"
        with_items:
          - { confsrc: '/usr/local/src/wordpress-24-04/opt/cloudstack/wordpress_cleanup.sh', confdest: '/opt/cloudstack/'}
          - { confsrc: '/usr/local/src/wordpress-24-04/opt/cloudstack/wordpress_update.sh', confdest: '/opt/cloudstack/'}

      - name: Wire cleanup script to run on first login
        lineinfile:
          path: /root/.bashrc
          line: "chmod +x /opt/cloudstack/wordpress_cleanup.sh && /opt/cloudstack/wordpress_cleanup.sh"
          state: present

      - name: Restarting sshd
        shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
