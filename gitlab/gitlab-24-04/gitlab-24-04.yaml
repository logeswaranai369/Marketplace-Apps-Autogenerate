- name: GitLab CE (omnibus) Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure GitLab CE (omnibus)
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # Block until the lock clears (and use lock_timeout on apt tasks) before installing.
          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300

          - name: Generating gitlab_initial_root_password
            shell: openssl rand -hex 24
            register: gitlab_initial_root_password

          - name: Storing gitlab_initial_root_password
            copy:
              dest: "/root/.gitlab_initial_root_password"
              content: |
                gitlab_initial_root_password = "{{ gitlab_initial_root_password.stdout }}"


          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: GitLab | install prerequisite packages
            debug:
              msg: "Installing prerequisite packages for GitLab CE omnibus"

          - name: GitLab | install prerequisites
            apt:
              name:
                - ca-certificates
                - curl
                - openssh-server
                - tzdata
                - perl
                - gnupg
              state: latest
              lock_timeout: 300

          - name: GitLab | add official omnibus apt repository
            debug:
              msg: "Adding the GitLab CE omnibus apt repository"

          - name: GitLab | download repository GPG key
            get_url:
              url: https://packages.gitlab.com/gitlab/gitlab-ce/gpgkey
              dest: /tmp/gitlab-ce.gpg.key
              mode: '0644'

          - name: GitLab | install dearmored keyring
            shell: gpg --dearmor < /tmp/gitlab-ce.gpg.key > /usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.gpg
            args:
              creates: /usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.gpg

          - name: GitLab | add apt repo (codename resolved at runtime for all Ubuntu versions)
            apt_repository:
              repo: "deb [signed-by=/usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.gpg] https://packages.gitlab.com/gitlab/gitlab-ce/ubuntu/ {{ ansible_distribution_release }} main"
              filename: gitlab_gitlab-ce
              state: present
              update_cache: yes

          - name: GitLab | check if gitlab-ce is already installed
            command: dpkg-query -W -f='${Status}' gitlab-ce
            register: gitlab_pkg_status
            failed_when: false
            changed_when: false

          - name: GitLab | wait for any held apt/dpkg lock before install
            shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
            changed_when: false

          - name: GitLab | installing gitlab-ce (large download + Chef reconfigure, may take 10-15 min)
            debug:
              msg: "Installing gitlab-ce with EXTERNAL_URL=http://{{ ansible_default_ipv4.address }} — this runs the first reconfigure and is slow; please wait"

          # Set EXTERNAL_URL (VM primary IP, never a hardcoded domain / bare localhost) and
          # GITLAB_ROOT_PASSWORD BEFORE install so the FIRST (and only) reconfigure uses them.
          # Using GITLAB_ROOT_PASSWORD means the stored secret is the REAL root password.
          # async with a generous timeout so the 10-15 min Chef run is never false-killed.
          - name: GitLab | install gitlab-ce (sets external_url + root password on first reconfigure)
            shell: |
              EXTERNAL_URL="http://{{ ansible_default_ipv4.address }}" \
              GITLAB_ROOT_PASSWORD='{{ gitlab_initial_root_password.stdout }}' \
              apt-get install -y gitlab-ce
            environment:
              DEBIAN_FRONTEND: noninteractive
            async: 3600
            poll: 30
            when: "'install ok installed' not in gitlab_pkg_status.stdout"

          - name: GitLab | ensure external_url is set to the VM IP in gitlab.rb
            lineinfile:
              path: /etc/gitlab/gitlab.rb
              regexp: '^#?\s*external_url\s+'
              line: "external_url 'http://{{ ansible_default_ipv4.address }}'"
              state: present

          - name: GitLab | running gitlab-ctl reconfigure (idempotent, 5-15 min Chef run)
            debug:
              msg: "Applying configuration with gitlab-ctl reconfigure"

          - name: GitLab | reconfigure to apply configuration
            command: gitlab-ctl reconfigure
            async: 1800
            poll: 30
            changed_when: false

          - name: GitLab | ensure all omnibus services are started
            command: gitlab-ctl start
            changed_when: false

          - name: GitLab | ensure gitlab-runsvdir supervisor is enabled and running
            service:
              name: gitlab-runsvdir
              state: started
              enabled: yes

          - name: GitLab | persisting credentials
            debug:
              msg: "Writing GitLab web UI credentials to /home/ubuntu/credentials.txt"

          # We set the root password via GITLAB_ROOT_PASSWORD above, so the secret variable IS the
          # working password. (The auto-generated /etc/gitlab/initial_root_password file self-deletes
          # after 24h; we do not depend on it.)
          - name: GitLab | write credentials file (0600)
            copy:
              dest: /home/ubuntu/credentials.txt
              mode: '0600'
              content: |
                GitLab CE (omnibus)
                Web UI:   http://{{ ansible_default_ipv4.address }}/
                Login:    root
                Password: {{ gitlab_initial_root_password.stdout }}

                Notes:
                - Change the root password on first login.
                - Firewall: allow 80/tcp (HTTP), 443/tcp (HTTPS), 22/tcp (git-over-SSH).
                - For production set a real external_url/domain + TLS (omnibus has built-in Let's Encrypt:
                  set external_url to https://your-domain and run `gitlab-ctl reconfigure`).
                - GitLab requires >= 4 GB RAM (8 GB recommended).

          - name: GitLab | waiting for the app to actually serve (Puma/nginx take 1-3 min after reconfigure)
            debug:
              msg: "Polling http://localhost/-/health until GitLab returns HTTP 200"

          # Gate on .status ONLY — the registered dict has no .content on a 502 retry.
          - name: GitLab | wait for readiness endpoint to return 200
            uri:
              url: http://localhost/-/health
              status_code: 200
            register: gitlab_health
            until: gitlab_health.status == 200
            retries: 30
            delay: 20
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/gitlab-24-04/opt/cloudstack/gitlab-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/gitlab-24-04/opt/cloudstack/gitlab-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/gitlab-24-04_cleanup.sh && /opt/cloudstack/gitlab-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
