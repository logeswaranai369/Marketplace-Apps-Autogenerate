- name: Joomla (LAMP) Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure Joomla (LAMP)
        block:
          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes

          - name: Generating joomla_admin_password
            shell: openssl rand -hex 24
            register: joomla_admin_password

          - name: Storing joomla_admin_password
            copy:
              dest: "/root/.joomla_admin_password"
              content: |
                joomla_admin_password = "{{ joomla_admin_password.stdout }}"
          - name: Generating joomla_db_password
            shell: openssl rand -hex 24
            register: joomla_db_password

          - name: Storing joomla_db_password
            copy:
              dest: "/root/.joomla_db_password"
              content: |
                joomla_db_password = "{{ joomla_db_password.stdout }}"
          - name: Generating mysql_root_password
            shell: openssl rand -hex 24
            register: mysql_root_password

          - name: Storing mysql_root_password
            copy:
              dest: "/root/.mysql_root_password"
              content: |
                mysql_root_password = "{{ mysql_root_password.stdout }}"

          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/joomla-lamp-24-04-24-04/etc/apache2/sites-available/joomla.conf', confdest: '/etc/apache2/sites-available/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Install Apache web server
            package:
              name:
                - apache2
                - libapache2-mod-php
              state: latest

          - name: Install PHP and required extensions
            package:
              name:
                - php
                - php-mysql
                - php-gd
                - php-mbstring
                - php-xml
                - php-curl
                - php-zip
                - php-intl
              state: latest

          - name: Install MariaDB and PyMySQL
            package:
              name:
                - mariadb-server
                - python3-pymysql
              state: latest

          - name: Ensure Apache and MariaDB are enabled and running
            service:
              name: "{{ item }}"
              state: started
              enabled: yes
            loop:
              - apache2
              - mariadb

          - name: "Stage - secure MariaDB root"
            debug:
              msg: "Securing MariaDB root with multi-auth (password OR unix_socket)"

          # Multi-auth so root can login via generated password OR unix_socket — never a lockout.
          - name: Secure MariaDB root (password + keep socket auth; no lockout)
            shell: |
              mysql -u root <<'SQL'
              ALTER USER 'root'@'localhost' IDENTIFIED VIA mysql_native_password USING PASSWORD('{{ mysql_root_password.stdout }}') OR unix_socket;
              FLUSH PRIVILEGES;
              SQL
            args:
              executable: /bin/bash

          - name: "Stage - create Joomla database and user"
            debug:
              msg: "Creating joomla database and user over the unix socket"

          - name: Create Joomla database
            community.mysql.mysql_db:
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: joomla
              state: present

          - name: Create Joomla database user
            community.mysql.mysql_user:
              login_unix_socket: /var/run/mysqld/mysqld.sock
              name: joomla
              password: "{{ joomla_db_password.stdout }}"
              host: localhost
              priv: "joomla.*:ALL"
              state: present

          - name: "Stage - download and extract Joomla"
            debug:
              msg: "Downloading and extracting Joomla into /var/www/html"

          - name: Download Joomla full package tarball
            get_url:
              url: https://github.com/joomla/joomla-cms/releases/download/5.3.3/Joomla_5.3.3-Stable-Full_Package.tar.gz
              dest: /tmp/joomla.tar.gz
              mode: '0644'

          - name: Check if Joomla is already extracted
            stat:
              path: /var/www/html/libraries/src/Version.php
            register: joomla_extracted

          - name: Ensure web root exists
            file:
              path: /var/www/html
              state: directory
              owner: www-data
              group: www-data

          - name: Extract Joomla into web root
            unarchive:
              src: /tmp/joomla.tar.gz
              dest: /var/www/html
              remote_src: yes
              owner: www-data
              group: www-data
            when: not joomla_extracted.stat.exists

          - name: "Stage - run Joomla CLI installer"
            debug:
              msg: "Running the Joomla non-interactive CLI installer"

          - name: Check if Joomla is already installed
            stat:
              path: /var/www/html/configuration.php
            register: joomla_configured

          - name: Run Joomla CLI installer (non-interactive)
            become: yes
            become_user: www-data
            command: >
              php installation/joomla.php install
              --site-name="Joomla Site"
              --admin-user="Administrator"
              --admin-username=admin
              --admin-password='{{ joomla_admin_password.stdout }}'
              --admin-email=admin@localhost.local
              --db-type=mysqli
              --db-host=localhost
              --db-user=joomla
              --db-pass='{{ joomla_db_password.stdout }}'
              --db-name=joomla
              --db-prefix=jos_
              --db-encryption=0
            args:
              chdir: /var/www/html
            when: not joomla_configured.stat.exists

          - name: Remove Joomla installation directory after successful install
            file:
              path: /var/www/html/installation
              state: absent

          - name: Enable SEF URLs by deploying .htaccess
            copy:
              src: /var/www/html/htaccess.txt
              dest: /var/www/html/.htaccess
              remote_src: yes
              owner: www-data
              group: www-data
              mode: '0644'
              force: no

          - name: Ensure web root ownership is correct
            file:
              path: /var/www/html
              state: directory
              owner: www-data
              group: www-data
              recurse: yes

          - name: "Stage - configure Apache vhost"
            debug:
              msg: "Deploying Joomla Apache vhost on port 80"

          - name: Deploy Joomla Apache virtual host
            copy:
              dest: /etc/apache2/sites-available/joomla.conf
              content: |
                <VirtualHost *:80>
                    ServerName localhost
                    DocumentRoot /var/www/html

                    DirectoryIndex index.php index.html

                    <Directory /var/www/html>
                        Options FollowSymLinks
                        AllowOverride All
                        Require all granted
                    </Directory>

                    ErrorLog ${APACHE_LOG_DIR}/joomla_error.log
                    CustomLog ${APACHE_LOG_DIR}/joomla_access.log combined
                </VirtualHost>
              mode: '0644'

          - name: Enable Joomla site, rewrite module and disable default site
            command: "{{ item }}"
            loop:
              - a2enmod rewrite
              - a2ensite joomla
              - a2dissite 000-default
            ignore_errors: yes

          - name: Restart Apache to apply configuration
            service:
              name: apache2
              state: restarted

          - name: "Stage - aggregate credentials"
            debug:
              msg: "Writing credentials to /home/ubuntu/credentials.txt"

          - name: Write aggregated credentials file
            copy:
              dest: /home/ubuntu/credentials.txt
              content: |
                Joomla Admin URL: http://<server-ip>/administrator
                Joomla Admin Username: admin
                Joomla Admin Password: {{ joomla_admin_password.stdout }}

                Joomla Database Name: joomla
                Joomla Database User: joomla
                Joomla Database Password: {{ joomla_db_password.stdout }}

                MariaDB root Password: {{ mysql_root_password.stdout }}
              owner: ubuntu
              group: ubuntu
              mode: '0600'

          - name: Verify Joomla home page serves HTTP 200
            uri:
              url: http://localhost/
              status_code: 200
              follow_redirects: all
            register: joomla_health
            retries: 5
            delay: 5
            until: joomla_health.status == 200
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/joomla-lamp-24-04-24-04/opt/cloudstack/joomla-lamp-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/joomla-lamp-24-04-24-04/opt/cloudstack/joomla-lamp-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/joomla-lamp-24-04_cleanup.sh && /opt/cloudstack/joomla-lamp-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
