- name: Kibana Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Install and configure Kibana
        block:
          # On a freshly-booted Ubuntu the apt/dpkg lock is held by cloud-init's boot-time
          # `unattended-upgrades`/apt.systemd.daily. The first package task races it and fails with
          # "Could not get lock /var/lib/dpkg/lock-frontend ... held by process N (unattended-upgr)".
          # Block until the lock clears (and use lock_timeout on apt tasks) before installing.
          - name: Await release of the apt/dpkg lock (boot-time unattended-upgrades)
            shell: |
              for i in $(seq 1 60); do
                fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1 || exit 0
                sleep 10
              done
              exit 0
            changed_when: false

          - name: Updating Packages
            ansible.builtin.apt:
              update_cache: yes
              lock_timeout: 300

          - name: Generating kibanaadmin_basic_auth_password
            shell: openssl rand -hex 24
            register: kibanaadmin_basic_auth_password

          - name: Storing kibanaadmin_basic_auth_password
            copy:
              dest: "/root/.kibanaadmin_basic_auth_password"
              content: |
                kibanaadmin_basic_auth_password = "{{ kibanaadmin_basic_auth_password.stdout }}"
          - name: Generating kibana_encrypted_saved_objects_key
            shell: openssl rand -hex 24
            register: kibana_encrypted_saved_objects_key

          - name: Storing kibana_encrypted_saved_objects_key
            copy:
              dest: "/root/.kibana_encrypted_saved_objects_key"
              content: |
                kibana_encrypted_saved_objects_key = "{{ kibana_encrypted_saved_objects_key.stdout }}"
          - name: Generating kibana_reporting_encryption_key
            shell: openssl rand -hex 24
            register: kibana_reporting_encryption_key

          - name: Storing kibana_reporting_encryption_key
            copy:
              dest: "/root/.kibana_reporting_encryption_key"
              content: |
                kibana_reporting_encryption_key = "{{ kibana_reporting_encryption_key.stdout }}"
          - name: Generating kibana_security_encryption_key
            shell: openssl rand -hex 24
            register: kibana_security_encryption_key

          - name: Storing kibana_security_encryption_key
            copy:
              dest: "/root/.kibana_security_encryption_key"
              content: |
                kibana_security_encryption_key = "{{ kibana_security_encryption_key.stdout }}"

          - name: Copy staged config files
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/kibana-24-04/etc/elasticsearch/elasticsearch.yml', confdest: '/etc/elasticsearch/'}
              - { confsrc: '/usr/local/src/kibana-24-04/etc/elasticsearch/jvm.options.d/heap.options', confdest: '/etc/elasticsearch/jvm.options.d/'}
              - { confsrc: '/usr/local/src/kibana-24-04/etc/kibana/kibana.yml', confdest: '/etc/kibana/'}
              - { confsrc: '/usr/local/src/kibana-24-04/etc/nginx/sites-available/kibana', confdest: '/etc/nginx/sites-available/'}

          # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
          - name: Add Elasticsearch APT signing key
            shell: |
              curl -fsSL https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg
            args:
              creates: /usr/share/keyrings/elasticsearch-keyring.gpg

          - name: Add Elastic 8.x APT repository
            apt_repository:
              repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] https://artifacts.elastic.co/packages/8.x/apt stable main"
              state: present
              filename: elastic-8.x

          - name: Show stage - installing Elasticsearch and Kibana
            debug:
              msg: "Installing Elasticsearch and Kibana from the Elastic 8.x repo (same run so versions match)"

          - name: Install Elasticsearch and Kibana
            apt:
              name:
                - elasticsearch
                - kibana
              state: latest
              update_cache: yes
              lock_timeout: 300

          - name: Show stage - installing nginx and tools
            debug:
              msg: "Installing nginx reverse proxy and apache2-utils (htpasswd)"

          - name: Install nginx and apache2-utils
            apt:
              name:
                - nginx
                - apache2-utils
              state: latest
              lock_timeout: 300

          - name: Show stage - configuring Elasticsearch
            debug:
              msg: "Writing authoritative elasticsearch.yml (security disabled, single-node, localhost)"

          # Rule 28: overwrite the WHOLE file so the deb postinst 'BEGIN SECURITY AUTO CONFIGURATION'
          # block is fully replaced and no keys are duplicated. Preserve root:elasticsearch 0660.
          - name: Write authoritative elasticsearch.yml
            copy:
              dest: /etc/elasticsearch/elasticsearch.yml
              content: |
                cluster.name: kibana-allinone
                node.name: node-1
                path.data: /var/lib/elasticsearch
                path.logs: /var/log/elasticsearch
                network.host: localhost
                http.port: 9200
                discovery.type: single-node
                xpack.security.enabled: false
                xpack.security.enrollment.enabled: false
                xpack.security.http.ssl.enabled: false
                xpack.security.transport.ssl.enabled: false
              owner: root
              group: elasticsearch
              mode: '0660'

          - name: Bound Elasticsearch JVM heap to 512m
            copy:
              dest: /etc/elasticsearch/jvm.options.d/heap.options
              content: |
                -Xms512m
                -Xmx512m
              owner: root
              group: elasticsearch
              mode: '0660'

          - name: Show stage - starting Elasticsearch
            debug:
              msg: "Enabling and starting Elasticsearch first, then waiting for it to become ready"

          - name: Enable and start Elasticsearch
            service:
              name: elasticsearch
              state: started
              enabled: yes

          - name: Wait until Elasticsearch is up (HTTP 200 with cluster_name)
            uri:
              url: http://localhost:9200/
              return_content: yes
            register: es_status
            until: es_status.status == 200 and 'cluster_name' in es_status.content
            retries: 40
            delay: 15

          - name: Show stage - configuring Kibana
            debug:
              msg: "Writing kibana.yml (localhost:5601 -> localhost:9200) with runtime encryption keys"

          # Rule 25: write kibana.yml exactly once, inline, with the real generated encryption keys.
          - name: Write authoritative kibana.yml
            copy:
              dest: /etc/kibana/kibana.yml
              content: |
                server.port: 5601
                server.host: "localhost"
                elasticsearch.hosts: ["http://localhost:9200"]
                xpack.encryptedSavedObjects.encryptionKey: "{{ kibana_encrypted_saved_objects_key.stdout }}"
                xpack.reporting.encryptionKey: "{{ kibana_reporting_encryption_key.stdout }}"
                xpack.security.encryptionKey: "{{ kibana_security_encryption_key.stdout }}"
              owner: root
              group: kibana
              mode: '0660'

          - name: Show stage - configuring nginx reverse proxy
            debug:
              msg: "Setting up nginx :80 reverse proxy to Kibana with HTTP basic-auth"

          - name: Create htpasswd file for basic-auth user kibanaadmin
            shell: |
              htpasswd -b -c /etc/nginx/htpasswd.users kibanaadmin '{{ kibanaadmin_basic_auth_password.stdout }}'
            args:
              creates: /etc/nginx/htpasswd.users

          - name: Deploy nginx reverse-proxy site for Kibana
            copy:
              dest: /etc/nginx/sites-available/kibana
              content: |
                server {
                    listen 80;
                    server_name _;

                    auth_basic "Restricted Access";
                    auth_basic_user_file /etc/nginx/htpasswd.users;

                    location / {
                        proxy_pass http://localhost:5601;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host $host;
                        proxy_cache_bypass $http_upgrade;
                    }
                }
              mode: '0644'

          - name: Enable Kibana nginx site
            file:
              src: /etc/nginx/sites-available/kibana
              dest: /etc/nginx/sites-enabled/kibana
              state: link

          - name: Remove default nginx site
            file:
              path: /etc/nginx/sites-enabled/default
              state: absent

          - name: Show stage - starting Kibana and nginx
            debug:
              msg: "Enabling and starting Kibana and nginx"

          - name: Enable and start Kibana
            service:
              name: kibana
              state: started
              enabled: yes

          - name: Enable and restart nginx
            service:
              name: nginx
              state: restarted
              enabled: yes

          # Kibana takes 1-3 min to reach 'available' on first start; ride it out with retries.
          # Rule 26: correct double-quoted JSON marker, no failed_when:false so a true failure surfaces.
          - name: Wait until Kibana reports itself available
            uri:
              url: http://localhost:5601/api/status
              return_content: yes
            register: kb_status
            until: kb_status.status == 200 and '"level":"available"' in (kb_status.content | regex_replace('\s',''))
            retries: 40
            delay: 15

          - name: Write credentials file
            copy:
              dest: /home/ubuntu/credentials.txt
              content: |
                Kibana URL: http://{{ ansible_default_ipv4.address | default('<server-ip>') }}/
                Basic-auth user: kibanaadmin
                Basic-auth password: {{ kibanaadmin_basic_auth_password.stdout }}

                Elasticsearch: http://localhost:9200 (local-only, security DISABLED)
                Firewall: open TCP 80 ONLY. Ports 5601 (Kibana) and 9200 (Elasticsearch) are
                localhost-bound - do NOT open them.
              owner: ubuntu
              group: ubuntu
              mode: '0600'
          # ----- END app-specific tasks -----

          - name: Creating /opt/cloudstack directory
            ansible.builtin.file:
              path: /opt/cloudstack
              state: directory

          - name: Copy cleanup + update helper scripts
            copy:
              src: "{{ item.confsrc }}"
              dest: "{{ item.confdest }}"
            with_items:
              - { confsrc: '/usr/local/src/kibana-24-04/opt/cloudstack/kibana-24-04_cleanup.sh', confdest: '/opt/cloudstack/'}
              - { confsrc: '/usr/local/src/kibana-24-04/opt/cloudstack/kibana-24-04_update.sh', confdest: '/opt/cloudstack/'}

          - name: Wire cleanup script to run on first login
            lineinfile:
              path: /root/.bashrc
              line: "chmod +x /opt/cloudstack/kibana-24-04_cleanup.sh && /opt/cloudstack/kibana-24-04_cleanup.sh"
              state: present
        always:
          - name: Restarting sshd
            shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
