- name: nginx Setup
  hosts: localhost
  tasks:
      - name: Restarting sshd
        shell: "sed -i 's/#Match User anoncvs/ForceCommand echo Please wait until the installation is completed..../g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"

      - name: Updating Packages
        ansible.builtin.apt:
          update_cache: yes

      # ----- BEGIN app-specific tasks (LLM-generated from AppSpec) -----
      - name: Install nginx package
        apt:
          name: nginx
          state: latest
          update_cache: yes

      - name: Ensure nginx service is enabled and started
        service:
          name: nginx
          state: started
          enabled: yes

      - name: Debug - nginx installed and running
        debug:
          msg: "nginx installed and service started"

      - name: Verify nginx is listening on port 80 (welcome page returns 200)
        uri:
          url: http://localhost/
          status_code: 200
          return_content: no
        register: nginx_health
        retries: 5
        delay: 3
        until: nginx_health.status == 200

      - name: Debug - nginx health check passed
        debug:
          msg: "nginx welcome page returned HTTP {{ nginx_health.status }} on port 80"
      # ----- END app-specific tasks -----



      - name: Creating /opt/cloudstack directory
        ansible.builtin.file:
          path: /opt/cloudstack
          state: directory

      - name: Copy cleanup + update helper scripts
        copy:
          src: "{{ item.confsrc }}"
          dest: "{{ item.confdest }}"
        with_items:
          - { confsrc: '/usr/local/src/nginx-22.04/opt/cloudstack/nginx_cleanup.sh', confdest: '/opt/cloudstack/'}
          - { confsrc: '/usr/local/src/nginx-22.04/opt/cloudstack/nginx_update.sh', confdest: '/opt/cloudstack/'}

      - name: Wire cleanup script to run on first login
        lineinfile:
          path: /root/.bashrc
          line: "chmod +x /opt/cloudstack/nginx_cleanup.sh && /opt/cloudstack/nginx_cleanup.sh"
          state: present

      - name: Restarting sshd
        shell: "sed -i 's/ForceCommand echo Please wait until the installation is completed..../#Match User anoncvs/g' /etc/ssh/sshd_config && (systemctl restart ssh 2>/dev/null || systemctl restart sshd)"
