<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Varnish Cache Active</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; color: #222; }
        h1 { color: #c9302c; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Varnish cache active</h1>
    <p>This page is served by an nginx backend on <code>127.0.0.1:8080</code> and cached by Varnish on port <code>80</code>.</p>
    <p>Check the <code>X-Cache</code> response header (<code>HIT</code>/<code>MISS</code>) to confirm caching.</p>
    <p>Edit the backend in <code>/etc/varnish/default.vcl</code> to point Varnish at your real application.</p>
</body>
</html>
